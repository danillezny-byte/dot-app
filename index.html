<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
::placeholder{color:var(--text3)}
.btn{background:none;border:none;cursor:pointer;font-family:inherit}

/* ── TOKENS ── */
:root{
--bg:#ffffff;--bg2:#f5f5f7;--bg3:#e9e9ed;
--text:#111111;--text2:#888;--text3:#c0c0c6;
--border:#ebebef;
--accent:#6c5ce7;--accent-fg:#ffffff;--accent-dim:rgba(108,92,231,.1);
--red:#ff3b30;
--tab-h:52px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
[data-dark]{
--bg:#0e0e10;--bg2:#1a1a1c;--bg3:#26262a;
--text:#f2f2f7;--text2:#8e8e93;--text3:#44444a;
--border:#26262a;
--accent:#a29bfe;--accent-fg:#ffffff;--accent-dim:rgba(162,155,254,.12);
}

html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:400;overflow:hidden;overscroll-behavior:none;touch-action:none;transition:background .2s,color .2s;-webkit-font-smoothing:antialiased}
button,input,textarea,a,[class*="-btn"],[class*="-check"],[class*="-dot"],[class*="-del"],[class*="tab"],[class*="note-card"],[class*="task-item"],[class*="habit-row"],[class*="date-opt"],[class*="ctx-item"],[class*="ctx-cancel"]{touch-action:manipulation}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100dvh;width:100%;padding-top:var(--safe-t);overflow:hidden}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;flex-shrink:0}
.logo{font-weight:800;font-size:22px;letter-spacing:-.05em;color:var(--text)}
.logo-dot{color:var(--accent)}
.icon-btn{width:36px;height:36px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:color .15s;border-radius:10px}
.icon-btn:active{background:var(--bg2)}

/* ── SCREENS ── */
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;visibility:hidden;pointer-events:none}
.screen.active{visibility:visible;pointer-events:all;animation:screenIn .18s ease both}
@keyframes screenIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ── TAB BAR ── */
.tabbar{display:flex;border-top:1px solid var(--border);background:var(--bg);height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;cursor:pointer;color:var(--text3);position:relative}
.tab svg{flex-shrink:0;width:22px;height:22px;transition:color .15s}
.tab.active svg{color:var(--accent)}
.tab-dot{display:none}
.tab-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.02em;margin-top:3px;line-height:1}
.tab.active .tab-label{color:var(--accent)}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 22px 80px;touch-action:pan-y;overscroll-behavior:contain}
.scroll::-webkit-scrollbar,.fmt-bar::-webkit-scrollbar{display:none}

/* ── DIVIDERS ── */
.divider{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);padding:22px 0 9px}

/* ── EMPTY STATE ── */
.empty-state{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--text3);font-size:13px;font-weight:400;gap:14px;padding:40px 20px}
.empty-state svg{display:block;flex-shrink:0}
.empty-label{letter-spacing:.01em}

/* ── ANIMATIONS ── */
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes floatUpSlow{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes dotPulse{0%,100%{opacity:.2;transform:scale(.85)}50%{opacity:.7;transform:scale(1)}}
@keyframes illFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.empty-illus{animation:illFadeIn .5s ease both,floatUp 4s ease-in-out .5s infinite}
.empty-illus-slow{animation:illFadeIn .5s ease both,floatUpSlow 5s ease-in-out .5s infinite}

/* ── FAB ── */
.fab{position:absolute;bottom:18px;right:20px;width:50px;height:50px;border-radius:16px;background:var(--accent);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 28px rgba(108,92,231,.4);z-index:10;transition:transform .12s,box-shadow .12s}
.fab svg{width:20px;height:20px;stroke:#fff;flex-shrink:0}
.fab:active{transform:scale(.92);box-shadow:0 3px 14px rgba(108,92,231,.3)}
[data-dark] .fab{box-shadow:0 6px 28px rgba(108,92,231,.5)}

/* ── ADD SHEET ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:40;opacity:0;pointer-events:none;transition:opacity .22s}
.sheet-overlay.open{opacity:1;pointer-events:all}
.add-sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--bg);border-radius:20px 20px 0 0;padding:0 0 calc(8px + var(--safe-b));transform:translateY(100%);transition:transform .32s cubic-bezier(.32,1,.55,1);box-shadow:0 -1px 0 var(--border),0 -24px 60px rgba(0,0,0,.08);overflow-y:auto;overflow-x:hidden}
.add-sheet.open{transform:none}
[data-dark] .add-sheet{box-shadow:0 -1px 0 var(--border),0 -24px 60px rgba(0,0,0,.5)}
.sheet-handle{width:34px;height:4px;background:var(--bg3);border-radius:2px;margin:12px auto 4px}
.add-input-row{display:flex;align-items:flex-start;padding:14px 20px 12px;gap:12px;border-bottom:1px solid var(--border)}
.add-task-input,#habitInput,#renameInput,.search-input,.note-title-input,.note-content-input{-webkit-user-select:text;user-select:text;border:none;outline:none;font-family:inherit;color:var(--text)}
.add-task-input{flex:1;background:none;font-size:17px;font-weight:400;line-height:1.5;min-height:26px;resize:none;overflow:hidden}
.add-submit-btn{flex-shrink:0;font-size:14px;font-weight:600;color:var(--accent);padding:8px 0 8px 4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;min-height:44px}
.add-submit-btn.active{opacity:1;pointer-events:all}
.add-submit-btn:active{opacity:.5}

/* ── DATE ATTRS ── */
.add-attrs{display:flex;align-items:center;padding:2px 14px;min-height:44px;gap:4px}
.date-chip{display:none;align-items:center;gap:4px;background:var(--accent-dim);border-radius:20px;padding:5px 10px 5px 8px;font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;border:none;font-family:inherit;-webkit-user-select:none;transition:opacity .1s}
.date-chip.visible{display:flex}
.date-chip:active{opacity:.6}
.date-chip-x{font-size:13px;color:var(--accent);opacity:.55;margin-left:1px;line-height:1}
.add-date-btn{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:500;color:var(--text3);padding:6px 8px;border-radius:10px;-webkit-user-select:none;transition:background .1s}
.add-date-btn:active{background:var(--bg2)}
.add-date-btn.hidden{display:none}

/* ── DATE PICKER ── */
.date-picker{overflow:hidden;max-height:0;opacity:0;transition:max-height .28s cubic-bezier(.4,0,.2,1),opacity .18s}
.date-picker.open{max-height:440px;opacity:1}
.date-opts{border-top:1px solid var(--border);padding:0 20px}
.date-opt{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid var(--border);cursor:pointer;min-height:52px}
.date-opt:last-child{border-bottom:none}
.date-opt:active{opacity:.5}
.date-opt-left{display:flex;align-items:center;gap:12px}
.date-opt-text{font-size:16px;font-weight:400;color:var(--text)}
.date-opt-sub{font-size:12px;color:var(--text2);margin-top:2px}
.date-opt-right{display:flex;align-items:center;gap:8px}
.date-opt-check{font-size:14px;color:var(--accent);opacity:0}
.date-opt.selected .date-opt-check{opacity:1}

/* ── CALENDAR ── */
.cal-view{display:none;border-top:1px solid var(--border);padding:0 20px 8px}
.cal-view.open{display:block}
.cal-header{display:flex;align-items:center;padding:12px 0 8px}
.cal-back{font-size:14px;font-weight:500;color:var(--accent);cursor:pointer;padding:4px 0}
.cal-month-label{flex:1;text-align:center;font-size:15px;font-weight:600;color:var(--text)}
.cal-nav{display:flex}
.cal-nav-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--accent);cursor:pointer;border-radius:8px}
.cal-nav-btn:active{background:var(--bg2)}
.cal-day-names{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-day-name{text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:4px 0;letter-spacing:.06em;text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:14px;min-height:40px;color:var(--text);cursor:pointer;border-radius:10px;transition:background .1s}
.cal-cell:active:not(.is-past){background:var(--bg2)}
.cal-cell.other-month{opacity:.2;pointer-events:none}
.cal-cell.is-today{font-weight:700;color:var(--accent)}
.cal-cell.is-selected{background:var(--accent);color:#fff;font-weight:600}
.cal-cell.is-past{opacity:.25;pointer-events:none}

/* ── TASKS ── */
.task-item{display:flex;align-items:flex-start;gap:13px;padding:15px 0;border-bottom:1px solid var(--border);position:relative}
.task-check{width:22px;height:22px;border:1.5px solid var(--border);border-radius:50%;flex-shrink:0;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;padding:9px;box-sizing:content-box;margin-top:1px}
.task-check:active{transform:scale(.88)}
.task-check.done{background:var(--accent);border-color:var(--accent)}
.task-check.done::after{content:'';width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.task-text-wrap{flex:1;min-width:0}
.task-text{font-size:16px;font-weight:400;line-height:1.5;color:var(--text);word-break:break-word}
.task-text.done{color:var(--text3);text-decoration:line-through;text-decoration-color:var(--text3)}
.task-date-label{font-size:11px;font-weight:500;color:var(--text3);margin-top:2px;letter-spacing:.01em}
.task-date-label.overdue{color:var(--red)}
.task-delete{color:var(--text3);font-size:18px;cursor:pointer;padding:10px 6px 10px 10px;flex-shrink:0;line-height:1;opacity:0;transition:opacity .15s}
.task-delete:active{opacity:.6}
.done-toggle-btn{display:block;width:100%;text-align:left;padding:16px 0 8px;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);transition:color .15s}
.done-toggle-btn:active{color:var(--text)}
.done-list{display:grid;grid-template-rows:0fr;opacity:0;transition:grid-template-rows .28s ease,opacity .2s ease}
.done-list.open{grid-template-rows:1fr;opacity:1}
.done-list>div{overflow:hidden}

/* ── HABITS ── */
.week-row{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:2;background:var(--bg);padding:10px 22px;margin:0 -22px;border-bottom:1px solid var(--border)}
.week-row-spacer{flex:1;min-width:0}
.week-day-label{width:30px;text-align:center;font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--text3);text-transform:uppercase;flex-shrink:0}
.week-day-label.is-today{color:var(--accent)}
.week-row-del{width:26px;flex-shrink:0}
#habitsList{padding-top:0}
.habit-row{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);gap:12px;position:relative}
.habit-name{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.habit-name-text{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.habit-del{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3);font-size:16px;line-height:1;cursor:pointer;border-radius:50%;transition:color .12s,background .12s;opacity:0}
.habit-row:active .habit-del{opacity:.5}
.habit-del:active{opacity:.6}
.habit-streak-badge{flex-shrink:0;font-size:11px;color:var(--text3);white-space:nowrap;font-weight:500}
.habit-dots,.week-labels{display:flex;gap:0;flex-shrink:0}
.habit-dot{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;transition:background .15s,border-color .15s,opacity .12s;flex-shrink:0;opacity:.5;padding:0;margin:0 2px;-webkit-tap-highlight-color:rgba(108,92,231,.15)}
.habit-dot.checked{background:var(--accent);border-color:var(--accent);opacity:1}
.habit-dot.is-future{opacity:.2;pointer-events:none}
.habit-dot.is-today{border-color:var(--text3);opacity:.7}
.habit-dot.checked.is-today{opacity:1}
.habit-dot:active:not(.is-future){transform:scale(.88);transform-origin:center}

/* ── CONTEXT MENU ── */
.ctx-overlay{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s}
.ctx-overlay.open{opacity:1;pointer-events:all}
.ctx-menu{position:fixed;left:12px;right:12px;bottom:calc(12px + var(--safe-b));z-index:71;transform:translateY(120%);transition:transform .28s cubic-bezier(.32,1,.55,1)}
.ctx-menu.open{transform:none}
.ctx-group{background:var(--bg2);border-radius:14px;overflow:hidden;margin-bottom:8px}
.ctx-item{padding:14px 16px;font-size:17px;font-weight:400;min-height:52px;display:flex;align-items:center;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border)}
.ctx-item:last-child{border-bottom:none}
.ctx-item:active{background:var(--bg3)}
.ctx-item.destructive{color:var(--red)}
.ctx-label{padding:10px 16px 6px;font-size:12px;color:var(--text2);text-align:center;font-weight:500}
.ctx-cancel{background:var(--bg2);border-radius:14px;padding:14px 16px;font-size:17px;font-weight:600;color:var(--text);cursor:pointer;text-align:center}
.ctx-cancel:active{background:var(--bg3)}
.ctx-save{font-weight:600;justify-content:center;text-align:center}
#renameInput{width:100%;background:none;font-size:17px;font-weight:400;color:var(--text)}

/* ── NOTES LIST ── */
.notes-top{padding:10px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-input{width:100%;background:var(--bg2);border-radius:10px;padding:9px 14px;font-size:15px;font-weight:400;color:var(--text)}
.note-card{padding:16px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .12s;display:flex;align-items:flex-start}
.note-card-body{flex:1;min-width:0}
.note-del{color:var(--text3);font-size:18px;cursor:pointer;padding:16px 0 16px 10px;flex-shrink:0;line-height:1;opacity:0;transition:opacity .15s}
.note-card:active{opacity:.6}
.note-title{font-weight:600;font-size:15px;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-preview{font-size:13px;font-weight:400;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.note-meta{font-size:11px;font-weight:500;color:var(--text3);margin-top:5px;letter-spacing:.01em}
.note-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.tag-pill{display:inline-flex;align-items:center;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;color:#fff;line-height:1.5;flex-shrink:0;letter-spacing:.01em}
.tag-pill-x{margin-left:3px;opacity:.7;cursor:pointer;font-size:13px;line-height:1;padding:0 2px}
.tag-filter{display:flex;gap:6px;overflow-x:auto;padding:8px 0 2px}
.tag-filter::-webkit-scrollbar{display:none}
.tf-chip{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);color:var(--text3);cursor:pointer;transition:background .12s,color .12s,border-color .12s;-webkit-user-select:none;user-select:none}
.tf-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.editor-tags{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:8px 22px 12px;min-height:44px;border-bottom:1px solid var(--border)}
.editor-tag-input{border:none;outline:none;font-family:inherit;font-size:13px;color:var(--text);background:none;min-width:80px;flex:1;-webkit-user-select:text;user-select:text}
.editor-tag-input::placeholder{color:var(--text3)}

/* ── NOTE EDITOR ── */
.note-editor{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .26s cubic-bezier(.32,1,.55,1);z-index:15}
.note-editor.open{transform:none}
.editor-top{display:flex;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.editor-back{font-size:14px;font-weight:600;color:var(--accent);cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:4px}
.editor-spacer{flex:1}
.pin-btn,.delete-note-btn{color:var(--text3);padding:6px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pin-btn:active,.delete-note-btn:active{opacity:.6}
.pin-btn.pinned{color:var(--accent)}
.note-date-label{font-size:11px;color:var(--text3);padding:10px 22px 2px;flex-shrink:0;font-weight:500;letter-spacing:.01em}
.fmt-bar{display:flex;align-items:center;padding:4px 14px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;gap:2px}
.fmt-btn{min-width:40px;height:36px;border-radius:8px;color:var(--text3);font-size:14px;font-weight:600;padding:0 10px;white-space:nowrap;transition:background .12s,color .12s;display:flex;align-items:center;justify-content:center}
.fmt-btn:active{background:var(--bg2);color:var(--text)}
.fmt-btn.on{background:var(--accent-dim);color:var(--accent)}
.note-title-input{font-weight:700;font-size:26px;letter-spacing:-.02em;background:none;width:100%;padding:18px 22px 8px;line-height:1.25;color:var(--text)}
.note-content-input{font-size:16px;font-weight:400;background:none;width:100%;flex:1;padding:4px 22px 20px;line-height:1.65;color:var(--text);outline:none;overflow-y:auto;-webkit-user-select:text;user-select:text;word-break:break-word}
.note-content-input:empty:before{content:attr(placeholder);color:var(--text3);pointer-events:none;display:block}
.note-content-input h1{font-size:22px;font-weight:700;line-height:1.3;margin:6px 0 2px}
.note-content-input h2{font-size:18px;font-weight:600;line-height:1.35;margin:4px 0 2px}
.note-content-input b,.note-content-input strong{font-weight:700}
.note-content-input i,.note-content-input em{font-style:italic}

/* ── PRIORITY ── */
.priority-toggle{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;color:var(--text3);font-size:17px;font-weight:800;transition:color .12s,background .12s;line-height:1}
.priority-toggle:active{background:var(--bg2)}
.priority-toggle.on{color:var(--red)}
.task-priority-flag{font-size:11px;font-weight:700;color:var(--red);margin-left:2px;flex-shrink:0}

/* ── SETTINGS SHEET ── */
.settings-section{margin:12px 16px 4px;background:var(--bg2);border-radius:14px;overflow:hidden}
.settings-row{display:flex;align-items:center;padding:15px 16px;border-bottom:1px solid var(--border);font-size:16px;font-weight:400;color:var(--text);cursor:pointer;min-height:52px;gap:14px}
.settings-row:last-child{border-bottom:none}
.settings-row:active{background:var(--bg3)}
.settings-row-icon{color:var(--text3);display:flex;align-items:center}
.settings-row-right{margin-left:auto;color:var(--text3);display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500}

/* ── HABIT PROGRESS ── */

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg3);color:var(--text);border-radius:12px;padding:12px 16px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:14px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap;z-index:80;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
.toast-undo{color:var(--accent);font-weight:700;cursor:pointer}
</style>

<span class="settings-row-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
<span class="settings-row-label" id="sThemeLabel">Тёмная тема</span>
<span class="settings-row-right" id="sThemeVal"></span>
</div>
<div class="settings-row" id="sExportRow">
<span class="settings-row-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>
<span class="settings-row-label">Экспорт данных</span>
</div>
<div class="settings-row" id="sImportRow">
<span class="settings-row-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span>
<span class="settings-row-label">Импорт данных</span>
</div>
</div>
<div style="padding:8px 16px 4px"><div class="ctx-cancel" id="settingsCancel">Закрыть</div></div>
</div>
<div class="toast" id="toast"></div>
</div>
<script>
const uid=()=>Math.random().toString(36).slice(2);
let _toastTimer=null;
function showToast(msg,onUndo){
  clearTimeout(_toastTimer);
  const el=$('toast');
  el.innerHTML=`<span>${msg}</span>${onUndo?'<span class="toast-undo" id="toastUndo">Отменить</span>':''}`;
  el.classList.add('show');
  if(onUndo){const btn=$('toastUndo');btn.addEventListener('click',()=>{onUndo();el.classList.remove('show');},{once:true});}
  _toastTimer=setTimeout(()=>el.classList.remove('show'),6000);
}
const stripMd=s=>s.replace(/<[^>]+>/g,' ').replace(/&[a-z#0-9]+;/gi,' ').replace(/\s+/g,' ').trim();
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const todayStr=()=>iso(new Date());
const MO_SHORT=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const MO_FULL=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const DAY_RU=['пн','вт','ср','чт','пт','сб','вс'];
const findH=id=>S.habits.find(x=>x.id===id);
const findN=id=>S.notes.find(x=>x.id===id);
const $=id=>document.getElementById(id);
const iso=d=>[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-');
const show=id=>$(id).classList.add('open');
const hide=id=>$(id).classList.remove('open');
let editingTaskId=null;
let S={theme:'light',tasks:[],habits:[],notes:[],editingNoteId:null,search:'',doneOpen:false,tagFilter:null};
function save(){try{localStorage.setItem('dot_v2',JSON.stringify({theme:S.theme,tasks:S.tasks,habits:S.habits,notes:S.notes,doneOpen:S.doneOpen,editingNoteId:S.editingNoteId}));}catch(e){showToast('Хранилище заполнено — удали старые данные');}}
let _saveTimer=null;
function debouncedSave(){clearTimeout(_saveTimer);_saveTimer=setTimeout(save,300);}
function load(){try{const d=JSON.parse(localStorage.getItem('dot_v2')||'{}');S.theme=d.theme||'light';S.tasks=(d.tasks||[]).map(t=>({done:false,date:'',created:Date.now(),...t}));S.habits=(d.habits||[]).map(h=>({checks:{},...h}));S.notes=(d.notes||[]).map(n=>({pinned:false,createdAt:Date.now(),updatedAt:Date.now(),tags:[],...n}));S.doneOpen=d.doneOpen||false;S.editingNoteId=d.editingNoteId||null;}catch(e){}}
load();
function cleanOldChecks(){const cutoff=new Date();cutoff.setFullYear(cutoff.getFullYear()-5);const cutStr=iso(cutoff);S.habits.forEach(h=>{if(h.checks)Object.keys(h.checks).forEach(k=>{if(k<cutStr)delete h.checks[k];});});}
cleanOldChecks();
function applyTheme(){
  const dark=S.theme==='dark';
  document.documentElement.toggleAttribute('data-dark',dark);
  $('themeColor').content=dark?'#0e0e10':'#ffffff';
  $('iconSun').style.display=dark?'none':'';
  $('iconMoon').style.display=dark?'':'none';
}
applyTheme();
function doExport(){
  const data=JSON.stringify({version:'dot_v2',...JSON.parse(localStorage.getItem('dot_v2')||'{}')},null,2);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download='dot-backup-'+iso(new Date())+'.json';
  a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3000);
  showToast('Данные экспортированы');
}
// Settings sheet
function openSettings(){
  const dark=S.theme==='dark';
  $('sThemeVal').textContent=dark?'Вкл':'Выкл';
  show('settingsOverlay');show('settingsSheet');
}
function closeSettings(){hide('settingsOverlay');hide('settingsSheet');}
$('moreBtn').addEventListener('click',openSettings);
$('settingsCancel').addEventListener('click',closeSettings);
$('settingsOverlay').addEventListener('click',closeSettings);
$('sThemeRow').addEventListener('click',()=>{
  S.theme=S.theme==='light'?'dark':'light';applyTheme();save();
  $('sThemeVal').textContent=S.theme==='dark'?'Вкл':'Выкл';
});
$('sExportRow').addEventListener('click',()=>{doExport();closeSettings();});
$('sImportRow').addEventListener('click',()=>{$('importFile').click();closeSettings();});
$('importFile').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.tasks)S.tasks=d.tasks.map(t=>({done:false,date:'',created:Date.now(),...t}));
      if(d.habits)S.habits=d.habits.map(h=>({checks:{},...h}));
      if(d.notes)S.notes=d.notes.map(n=>({pinned:false,createdAt:Date.now(),updatedAt:Date.now(),tags:[],...n}));
      save();renderTasks();renderHabits();renderNotes();
      showToast('Данные импортированы');
    }catch(err){showToast('Ошибка: неверный файл');}
    e.target.value='';
  };
  reader.readAsText(file);
});
(()=>{const f=document.createElement('link');f.rel='icon';f.type='image/png';f.href=$('appIcon').href;document.head.appendChild(f);})();
$('themeToggle').addEventListener('click',()=>{S.theme=S.theme==='light'?'dark':'light';applyTheme();save();});
// Task priority toggle
let taskPriority=false;
$('priorityToggle').addEventListener('click',()=>{taskPriority=!taskPriority;$('priorityToggle').classList.toggle('on',taskPriority);});
const tabs=[...document.querySelectorAll('.tab')];
const screens=[...document.querySelectorAll('.screen')];
tabs.forEach(tab=>tab.addEventListener('click',()=>{
  if($('addSheet').classList.contains('open'))closeAddSheet();
  if($('habitSheet').classList.contains('open'))closeHabitSheet();
  tabs.forEach(x=>x.classList.remove('active'));tab.classList.add('active');
  screens.forEach(x=>x.classList.remove('active'));
  $('screen-'+tab.dataset.tab).classList.add('active');
}));
let _rdCache=null,_rdDay='';
function relDate(){
  const t=todayStr();if(_rdDay===t&&_rdCache)return _rdCache;
  _rdDay=t;const tm=new Date();tm.setDate(tm.getDate()+1);
  const dow=(new Date().getDay()+6)%7,dts=dow===6?7:6-dow,s=new Date();s.setDate(s.getDate()+dts);
  return _rdCache={tom:iso(tm),sun:s,sunStr:iso(s)};
}
function fmtDate(d,group){
  if(!d)return group?'без даты':'';
  const {tom,sun,sunStr}=relDate(),today=todayStr();
  if(d===today)return 'сегодня';
  if(d===tom)return 'завтра';
  if(d===sunStr)return group?'на этой неделе':'до вс, '+sun.getDate()+' '+MO_SHORT[sun.getMonth()];
  const dt=new Date(d+'T12:00:00');
  return DAY_RU[(dt.getDay()+6)%7]+', '+dt.getDate()+' '+MO_SHORT[dt.getMonth()];
}
const fmtDateGroup=d=>fmtDate(d,true);
function openSheet(sheetId,overlayId,focusId){
  show(overlayId);
  show(sheetId);
  if(focusId)$(focusId).focus();
}
function closeSheet(sheetId,overlayId){
  document.activeElement?.blur();
  hide(overlayId);
  const el=$(sheetId);el.classList.remove('open');el.style.transform='';el.style.bottom='';el.style.maxHeight='';
}
if(window.visualViewport){
  const onVV=()=>{
    const vv=window.visualViewport;
    const kb=Math.max(0,window.innerHeight-vv.height-vv.offsetTop);
    // Шторки: поднимаем над клавиатурой и ограничиваем высоту видимой областью
    ['addSheet','habitSheet'].forEach(id=>{
      const el=$(id);
      if(!el||!el.classList.contains('open'))return;
      el.style.bottom=kb>0?kb+'px':'';
      el.style.maxHeight=kb>0?(vv.height-12)+'px':'';
    });
    // Редактор заметок: уменьшаем снизу чтобы textarea не уходила под клавиатуру
    const ne=$('noteEditor');
    if(ne&&ne.classList.contains('open'))ne.style.bottom=kb>0?kb+'px':'';
  };
  window.visualViewport.addEventListener('resize',onVV);
  window.visualViewport.addEventListener('scroll',onVV);
}
document.addEventListener('touchmove',e=>{
  if(e.target.closest('.scroll,.add-sheet,.ctx-menu,.note-editor'))return;
  e.preventDefault();
},{passive:false});
let taskSelectedDate=todayStr(),calViewDate=new Date(),datePickerOpen=false;
function renderDateOpts(){
  _rdCache=null;_rdDay='';
  const{tom,sun}=relDate();
  const t=new Date(tom+'T12:00:00');
  const tS=DAY_RU[(t.getDay()+6)%7]+', '+t.getDate()+' '+MO_SHORT[t.getMonth()];
  const wS='до вс, '+sun.getDate()+' '+MO_SHORT[sun.getMonth()];
  $('dateOpts').innerHTML=[['today','Сегодня'],['tomorrow','Завтра',tS],['week','На этой неделе',wS],['nodate','Без даты'],['cal','Выбрать дату',,'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" opacity=".35"><polyline points="9 18 15 12 9 6"/></svg>']].map(([v,l,s,ic],i)=>`<div class="date-opt${i===0?' selected':''}" data-val="${v}"><div class="date-opt-left"><div><div class="date-opt-text">${l}</div>${s?`<div class="date-opt-sub">${s}</div>`:''}</div></div><div class="date-opt-right">${ic||'<div class="date-opt-check">✓</div>'}</div></div>`).join('');
}
renderDateOpts();
function openAddSheet(){pushModalState();renderDateOpts();taskSelectedDate=todayStr();openSheet('addSheet','sheetOverlay','taskInput');}
function openEditTask(id){
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  editingTaskId=id;
  pushModalState();
  taskSelectedDate=t.date||'';
  taskPriority=!!t.priority;
  $('priorityToggle').classList.toggle('on',taskPriority);
  openSheet('addSheet','sheetOverlay','taskInput');
  const inp=$('taskInput');inp.value=t.text;inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,120)+'px';
  $('addTaskBtn').classList.add('active');
  $('addTaskBtn').textContent='Сохранить';
  setDate(t.date?'custom':'nodate',t.date||undefined);
}
function closeAddSheet(){
  if(history.state?.modal)history.back();
  closeSheet('addSheet','sheetOverlay');
  editingTaskId=null;$('addTaskBtn').textContent='Добавить';
  closeDatePicker();
  const inp=$('taskInput');inp.value='';inp.style.height='auto';
  $('addTaskBtn').classList.remove('active');
  taskPriority=false;$('priorityToggle').classList.remove('on');
  setDate('today');
}
function openDatePicker(){
  datePickerOpen=true;
  $('dateOpts').style.display='';
  hide('calView');
  show('datePicker');
}
function closeDatePicker(){
  datePickerOpen=false;
  hide('datePicker');
  hide('calView');
  $('dateOpts').style.display='';
}
function setDate(val,customDate){
  if(val==='today')      taskSelectedDate=todayStr();
  else if(val==='tomorrow'){const d=new Date();d.setDate(d.getDate()+1);taskSelectedDate=iso(d);}
  else if(val==='week')  {const {sunStr}=relDate();taskSelectedDate=sunStr;}
  else if(val==='nodate')taskSelectedDate='';
  else if(customDate)    taskSelectedDate=customDate;
  let chipLabel='';
  if(val==='tomorrow')   chipLabel='Завтра';
  else if(val==='week')  chipLabel='На этой неделе';
  else if(customDate){const dt=new Date(customDate+'T12:00:00');chipLabel=dt.getDate()+' '+MO_SHORT[dt.getMonth()];}
  const isDefault=val==='today'||val==='nodate';
  $('dateChip').classList.toggle('visible',!isDefault);
  $('addDateBtn').classList.toggle('hidden',!isDefault);
  if(!isDefault&&chipLabel)$('dateChipLabel').textContent=chipLabel;
  $('addDateBtn').lastChild.textContent=val==='nodate'?' Без даты':' Сегодня';
  document.querySelectorAll('.date-opt').forEach(o=>o.classList.toggle('selected',o.dataset.val===val));
}
$('addDateBtn').addEventListener('click',()=>datePickerOpen?closeDatePicker():openDatePicker());
$('dateChip').addEventListener('click',e=>{
  if(e.target.closest('#dateChipX')){setDate('today');closeDatePicker();return;}
  datePickerOpen?closeDatePicker():openDatePicker();
});
$('dateOpts').addEventListener('click',e=>{
  const opt=e.target.closest('.date-opt');if(!opt)return;
  const val=opt.dataset.val;
  if(val==='cal'){$('dateOpts').style.display='none';show('calView');calViewDate=new Date();renderCal();}
  else{setDate(val);closeDatePicker();$('taskInput').focus();}
});
$('calBack').addEventListener('click',()=>{$('dateOpts').style.display='';hide('calView');});
$('calPrevBtn').addEventListener('click',()=>{calViewDate.setMonth(calViewDate.getMonth()-1);renderCal();});
$('calNextBtn').addEventListener('click',()=>{calViewDate.setMonth(calViewDate.getMonth()+1);renderCal();});
function renderCal(){
  const y=calViewDate.getFullYear(),m=calViewDate.getMonth();
  $('calMonthLabel').textContent=MO_FULL[m]+' '+y;
  const todayD=new Date();todayD.setHours(0,0,0,0);
  const first=new Date(y,m,1),last=new Date(y,m+1,0),startDow=(first.getDay()+6)%7;
  let cells='';
  for(let i=0;i<startDow;i++){const d=new Date(y,m,0-startDow+i+1);cells+=`<div class="cal-cell other-month">${d.getDate()}</div>`;}
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(y,m,d);date.setHours(0,0,0,0);
    const cls=[date.getTime()===todayD.getTime()?'is-today':'',date<todayD?'is-past':'',taskSelectedDate===iso(date)?'is-selected':''].filter(Boolean).join(' ');
    cells+=`<div class="cal-cell ${cls}" data-date="${iso(date)}">${d}</div>`;
  }
  const rem=(7-((startDow+last.getDate())%7))%7;
  for(let i=1;i<=rem;i++)cells+=`<div class="cal-cell other-month">${i}</div>`;
  $('calGrid').innerHTML=cells;
}
$('calGrid').addEventListener('click',e=>{
  const cell=e.target.closest('.cal-cell');
  if(!cell||cell.classList.contains('is-past')||cell.classList.contains('other-month'))return;
  const ds=cell.dataset.date;if(!ds)return;
  setDate(ds===todayStr()?'today':'custom',ds);
  closeDatePicker();$('taskInput').focus();
});
$('taskInput').addEventListener('input',function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';
  $('addTaskBtn').classList.toggle('active',!!this.value.trim());
});
$('sheetOverlay').addEventListener('click',closeAddSheet);
$('addTaskFab').addEventListener('click',openAddSheet);
function addTask(){
  const inp=$('taskInput'),text=inp.value.trim();if(!text)return;
  if(editingTaskId){
    const t=S.tasks.find(x=>x.id===editingTaskId);
    if(t){t.text=text;t.date=taskSelectedDate;t.priority=taskPriority||false;}
    editingTaskId=null;$('addTaskBtn').textContent='Добавить';
  }else{
    S.tasks.push({id:uid(),text,date:taskSelectedDate,priority:taskPriority||false,done:false,created:Date.now()});
  }
  save();renderTasks();closeAddSheet();
}
$('addTaskBtn').addEventListener('click',addTask);
$('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTask();}});
function taskHTML(t,_today){
  const dc=t.done?'done':'';
  const ov=(!t.done&&t.date&&t.date<_today)?'overdue':'';
  const prio=t.priority&&!t.done?'<span class="task-priority-flag">!</span>':'';
  return `<div class="task-item"><div class="task-check ${dc}" data-id="${t.id}"></div><div class="task-text-wrap"><div class="task-text ${dc}">${esc(t.text)}${prio}</div>${t.date?`<div class="task-date-label ${ov}">${fmtDate(t.date)}</div>`:''}</div><span class="task-delete" data-id="${t.id}">×</span></div>`;
}
function renderTasks(){
  const _today=todayStr(),el=$('taskList');
  const active=S.tasks.filter(t=>!t.done),done=S.tasks.filter(t=>t.done);
  if(!active.length&&!done.length){el.innerHTML=`<div class="empty-state"><svg class="empty-illus" width="100" height="88" viewBox="0 0 100 88" fill="none"><rect x="4" y="6" width="26" height="26" rx="7" stroke="currentColor" stroke-width="1.6" opacity=".4"/><path d="M11 19l5 5 9-10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="24" stroke-dashoffset="24" opacity=".55"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="0.5s" begin="0.4s" fill="freeze"/></path><rect x="38" y="14" width="58" height="7" rx="3.5" fill="currentColor" opacity=".12"/><rect x="4" y="44" width="26" height="26" rx="7" stroke="currentColor" stroke-width="1.6" opacity=".18"/><rect x="38" y="52" width="44" height="7" rx="3.5" fill="currentColor" opacity=".08"/></svg><span class="empty-label">нет задач</span></div>`;;return;}
  const g={};active.forEach(t=>{const k=t.date||'';if(!g[k])g[k]=[];g[k].push(t);});
  let html=Object.keys(g).sort((a,b)=>!a?1:!b?-1:a.localeCompare(b)).map(k=>{
    const sorted=g[k].slice().sort((a,b)=>(b.priority?1:0)-(a.priority?1:0));
    return `<div class="divider">${fmtDateGroup(k)}</div>`+sorted.map(t=>taskHTML(t,_today)).join('');
  }).join('');
  if(done.length){
    html+=`<button class="btn done-toggle-btn" id="doneToggle">выполненные (${done.length})</button><div class="done-list ${S.doneOpen?'open':''}" id="doneList"><div>${done.slice().reverse().map(t=>taskHTML(t,_today)).join('')}</div></div>`;
  }
  el.innerHTML=html;
  }
function toggleTask(id){const t=S.tasks.find(x=>x.id===id);if(t){t.done=!t.done;save();renderTasks();}}
function deleteTask(id){const idx=S.tasks.findIndex(x=>x.id===id);if(idx<0)return;const t=S.tasks[idx];S.tasks.splice(idx,1);save();renderTasks();showToast('Задача удалена',()=>{S.tasks.splice(idx,0,t);save();renderTasks();});}
$('taskList').addEventListener('click',e=>{
  const ch=e.target.closest('.task-check'),dl=e.target.closest('.task-delete');
  const wrap=e.target.closest('.task-text-wrap');
  if(ch)toggleTask(ch.dataset.id);
  else if(dl)deleteTask(dl.dataset.id);
  else if(wrap){const item=wrap.closest('.task-item');if(item){const id=item.querySelector('.task-check')?.dataset.id;if(id)openEditTask(id);}}
  else if(e.target.closest('.done-toggle-btn')){S.doneOpen=!S.doneOpen;save();renderTasks();}
});
function addHoverDel(listId,rowSel,delSel){
  const el=$(listId);
  el.addEventListener('mouseover',e=>{const r=e.target.closest(rowSel);if(r){const d=r.querySelector(delSel);if(d)d.style.opacity='1';}});
  el.addEventListener('mouseout',e=>{const r=e.target.closest(rowSel);if(r&&!r.contains(e.relatedTarget)){const d=r.querySelector(delSel);if(d)d.style.opacity='';}});
}
addHoverDel('taskList','.task-item','.task-delete');
addHoverDel('habitsList','.habit-row','.habit-del');
addHoverDel('notesList','.note-card','.note-del');
// Task context menu
let _ctxTaskId=null;
function showTaskMenu(id){const t=S.tasks.find(x=>x.id===id);if(!t)return;_ctxTaskId=id;pushModalState();$('taskCtxLabel').textContent=t.text;show('taskCtxOverlay');show('taskCtxMenu');}
function hideTaskMenu(){if(history.state?.modal)history.back();hide('taskCtxOverlay');hide('taskCtxMenu');}
$('taskCtxCancel').addEventListener('click',hideTaskMenu);
$('taskCtxOverlay').addEventListener('click',hideTaskMenu);
$('taskCtxEdit').addEventListener('click',()=>{hideTaskMenu();openEditTask(_ctxTaskId);});
$('taskCtxDel').addEventListener('click',()=>{deleteTask(_ctxTaskId);hideTaskMenu();});
addLongPress($('taskList'),'.task-item',id=>{const ch=document.querySelector(`.task-check[data-id="${id}"]`);if(ch)showTaskMenu(id);},'.task-check');
renderTasks();// History API: кнопка «назад» закрывает шторки/редактор
function pushModalState(){try{history.pushState({modal:true},'');}catch(e){}}
function popModalState(){
  if($('noteEditor').classList.contains('open')){const n=findN(S.editingNoteId);if(n&&!n.title.trim()&&!n.content.replace(/<[^>]*>/g,'').trim()){const idx=S.notes.indexOf(n);if(idx>=0){S.notes.splice(idx,1);save();renderNotes();}}else saveNote();hide('noteEditor');$('newNoteBtn').style.opacity='';$('newNoteBtn').style.pointerEvents='';return;}
  if($('addSheet').classList.contains('open')){closeAddSheet();return;}
  if($('habitSheet').classList.contains('open')){closeHabitSheet();return;}
  if($('taskCtxMenu').classList.contains('open')){hideTaskMenu();return;}
  if($('noteCtxMenu').classList.contains('open')){hideNoteMenu();return;}
  if($('ctxMenu').classList.contains('open')){hide('ctxOverlay');hide('ctxMenu');return;}

function getWeek(){
  const today=new Date(),dow=today.getDay(),diff=dow===0?6:dow-1,days=[];
  for(let i=0;i<7;i++){const d=new Date(today);d.setDate(today.getDate()-diff+i);days.push(iso(d));}
  return days;
}
function dayLabel(ds){return ['вс','пн','вт','ср','чт','пт','сб'][new Date(ds+'T12:00:00').getDay()];}
function calcStreak(h){
  if(!h.checks)return 0;
  // Ищем последний отмеченный день в пределах 8 дней
  let d=new Date(),found=false;
  for(let i=0;i<8;i++){if(h.checks[iso(d)]){found=true;break;}d.setDate(d.getDate()-1);}
  if(!found)return 0;
  // Считаем непрерывную серию назад от найденного дня
  let s=0;
  while(s<400){const k=iso(d);if(!h.checks[k])break;s++;d.setDate(d.getDate()-1);}
  return s;
}
function renderHabits(){
  const week=getWeek(),today=todayStr(),el=$('habitsList');
  const weekHeader=`<div class="week-row"><div class="week-row-spacer"></div><div class="week-labels">${week.map(d=>`<div class="week-day-label ${d===today?'is-today':''}">${dayLabel(d).toUpperCase()}</div>`).join('')}</div><div class="week-row-del"></div></div>`;
  if(!S.habits.length){el.innerHTML=weekHeader+`<div class="empty-state" style="min-height:calc(100% - 56px)"><svg class="empty-illus-slow" width="120" height="64" viewBox="0 0 120 64" fill="none"><rect x="2" y="12" width="14" height="28" rx="5" fill="currentColor" opacity=".38" style="animation:dotPulse 1.6s ease-in-out 0s infinite"/><rect x="19" y="12" width="14" height="28" rx="5" fill="currentColor" opacity=".32" style="animation:dotPulse 1.6s ease-in-out 0.14s infinite"/><rect x="36" y="12" width="14" height="28" rx="5" stroke="currentColor" stroke-width="1.4" opacity=".25" style="animation:dotPulse 1.6s ease-in-out 0.28s infinite"/><rect x="53" y="12" width="14" height="28" rx="5" stroke="currentColor" stroke-width="1.4" opacity=".18" style="animation:dotPulse 1.6s ease-in-out 0.42s infinite"/><rect x="70" y="12" width="14" height="28" rx="5" stroke="currentColor" stroke-width="1.4" opacity=".13" style="animation:dotPulse 1.6s ease-in-out 0.56s infinite"/><rect x="87" y="12" width="14" height="28" rx="5" stroke="currentColor" stroke-width="1.4" opacity=".1" style="animation:dotPulse 1.6s ease-in-out 0.70s infinite"/><rect x="104" y="12" width="14" height="28" rx="5" stroke="currentColor" stroke-width="1.4" opacity=".08" style="animation:dotPulse 1.6s ease-in-out 0.84s infinite"/></svg><span class="empty-label">нет привычек</span></div>`;return;}
  el.innerHTML=weekHeader+S.habits.map(h=>{
    const streak=calcStreak(h);
    const checked=week.filter(d=>h.checks&&h.checks[d]).length;
    const pct=Math.round(checked/7*100);
    const dots=week.map(d=>{
      const chk=h.checks&&h.checks[d];
      return `<div class="habit-dot${chk?' checked':''}${d>today?' is-future':''}${d===today?' is-today':''}" data-id="${h.id}" data-date="${d}"></div>`;
    }).join('');
    const pctColor=pct>=80?'var(--accent)':pct>=50?'#fdcb6e':'var(--text3)';
    return `<div class="habit-row" data-id="${h.id}"><div class="habit-name"><span class="habit-name-text">${esc(h.name)}</span>${streak>0?`<span class="habit-streak-badge">${streak}${streak>=3?'🔥':'д'}</span>`:''}<span style="font-size:10px;font-weight:600;color:${pctColor};margin-left:auto;flex-shrink:0">${pct}%</span></div><div class="habit-dots">${dots}</div><div class="habit-del" data-del="${h.id}">×</div></div>`;
  }).join('');
}

function addLongPress(el,rowSel,onPress,ignore){
  let t=null,x0=0,y0=0;
  const start=e=>{
    const row=e.target.closest(rowSel);if(!row||(ignore&&e.target.closest(ignore)))return;
    clearTimeout(t);
    x0=e.touches?e.touches[0].clientX:e.clientX;y0=e.touches?e.touches[0].clientY:e.clientY;
    t=setTimeout(()=>{t=null;onPress(row.dataset.id);},500);
  };
  const cancel=()=>clearTimeout(t);
  const moveCancel=e=>{
    if(!t)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
    if((cx-x0)*(cx-x0)+(cy-y0)*(cy-y0)>81)cancel();
  };
  el.addEventListener('mousedown',start);
  el.addEventListener('mouseup',cancel);
  el.addEventListener('mouseleave',cancel);
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',cancel);
  el.addEventListener('touchmove',moveCancel,{passive:true});
  el.addEventListener('touchcancel',cancel);
}

const TAG_PALETTE=['#6c5ce7','#0984e3','#00b894','#e17055','#fd79a8','#a29bfe','#fdcb6e','#00cec9'];
function tagColor(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))&0xffff;return TAG_PALETTE[h%TAG_PALETTE.length];}
function getAllTags(){const s=new Set();S.notes.forEach(n=>(n.tags||[]).forEach(t=>s.add(t)));return[...s];}
function renderTagFilter(){
  const tags=getAllTags(),el=$('tagFilter');
  if(!tags.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="tf-chip ${!S.tagFilter?'on':''}" data-tag="">Все</div>`+tags.map(t=>`<div class="tf-chip ${S.tagFilter===t?'on':''}" data-tag="${esc(t)}" style="border-color:${tagColor(t)};color:${S.tagFilter===t?'#fff':tagColor(t)};${S.tagFilter===t?'background:'+tagColor(t)+';':''}">${esc(t)}</div>`).join('');
  el.querySelectorAll('.tf-chip').forEach(c=>c.addEventListener('click',()=>{S.tagFilter=c.dataset.tag||null;renderNotes();}));
}
function renderEditorTags(n){
  const el=$('editorTags');if(!el)return;
  const tags=n.tags||[];
  el.innerHTML=tags.map(t=>`<span class="tag-pill" style="background:${tagColor(t)}">${esc(t)}<span class="tag-pill-x" data-tag="${esc(t)}">×</span></span>`).join('')+`<input class="editor-tag-input" id="tagInput" placeholder="+ тег" autocomplete="off" enterkeyhint="done">`;
  el.querySelectorAll('.tag-pill-x').forEach(x=>x.addEventListener('click',e=>{
    e.stopPropagation();const n2=findN(S.editingNoteId);if(!n2)return;
    n2.tags=(n2.tags||[]).filter(t=>t!==x.dataset.tag);save();renderNotes();renderEditorTags(n2);
  }));
  const inp=$('tagInput');
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'||e.key===','){
      e.preventDefault();const val=inp.value.trim().replace(/,/g,'');
      if(val){const n2=findN(S.editingNoteId);if(!n2)return;if(!(n2.tags||[]).includes(val)){n2.tags=[...(n2.tags||[]),val];save();renderNotes();}renderEditorTags(n2);}
    }else if(e.key==='Backspace'&&!inp.value){
      const n2=findN(S.editingNoteId);if(!n2||!n2.tags||!n2.tags.length)return;
      n2.tags=n2.tags.slice(0,-1);save();renderNotes();renderEditorTags(n2);
    }
  });
  inp.addEventListener('blur',()=>{
    const val=inp.value.trim();
    if(val){const n2=findN(S.editingNoteId);if(!n2)return;if(!(n2.tags||[]).includes(val)){n2.tags=[...(n2.tags||[]),val];save();renderNotes();}renderEditorTags(n2);}
  });
}
function renderNotes(){
  const q=S.search.toLowerCase();
  let list=S.notes.filter(n=>!q||(n.title+stripMd(n.content)+(n.tags||[]).join(' ')).toLowerCase().includes(q));
  if(S.tagFilter)list=list.filter(n=>(n.tags||[]).includes(S.tagFilter));
  const el=$('notesList');
  if(!list.length){el.innerHTML=`<div class="empty-state"><svg class="empty-illus" width="76" height="92" viewBox="0 0 76 92" fill="none"><rect x="4" y="4" width="56" height="68" rx="9" stroke="currentColor" stroke-width="1.6" opacity=".28"/><path d="M44 4 v14 h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity=".18"/><rect x="13" y="27" width="2" height="10" rx="1" fill="currentColor" opacity=".5"><animate attributeName="opacity" values="0.5;0;0.5" dur="1.1s" repeatCount="indefinite"/></rect><rect x="13" y="42" width="38" height="5" rx="2.5" fill="currentColor" opacity=".16"/><rect x="13" y="52" width="30" height="5" rx="2.5" fill="currentColor" opacity=".11"/><rect x="13" y="62" width="22" height="5" rx="2.5" fill="currentColor" opacity=".07"/></svg><span class="empty-label">нет записей</span></div>`;renderTagFilter();return;}
  const tagPills=tags=>tags&&tags.length?`<div class="note-tags">${tags.map(t=>`<span class="tag-pill" style="background:${tagColor(t)}">${esc(t)}</span>`).join('')}</div>`:'';
  const noteCard=n=>`<div class="note-card" data-id="${n.id}"><div class="note-card-body"><div class="note-title">${n.pinned?'◆ ':''}${esc(n.title)||'Без заголовка'}</div><div class="note-preview">${esc(stripMd(n.content).slice(0,120))||'Нет текста'}</div>${tagPills(n.tags)}<div class="note-meta">${n.updatedAt?new Date(n.updatedAt).toLocaleDateString('ru',{day:'numeric',month:'short'}):''}</div></div><span class="note-del" data-id="${n.id}">×</span></div>`;
  el.innerHTML=list.slice().sort((a,b)=>b.pinned-a.pinned).map(noteCard).join('');
  renderTagFilter();
}
function openNote(id){

  ce.innerHTML=/<[a-z]/i.test(c)?c:esc(c).replace(/\n/g,'<br>');
  $('pinBtn').classList.toggle('pinned',!!n.pinned);
  $('noteDateLabel').textContent=(n.updatedAt?new Date(n.updatedAt):new Date()).toLocaleDateString('ru',{day:'numeric',month:'long',year:'numeric'});
  renderEditorTags(n);
  $('newNoteBtn').style.opacity='0';$('newNoteBtn').style.pointerEvents='none';
  show('noteEditor');
  setTimeout(updateFmtBar,50);
}
function saveNote(){

}

const fmtIcons={
  h1:'H1',h2:'H2',bold:'<b>B</b>',
  italic:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>',
  bullet:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>'
};
$('fmtBar').innerHTML=Object.entries(fmtIcons).map(([f,l])=>`<button class="btn fmt-btn" data-fmt="${f}">${l}</button>`).join('');
// Сохраняем Range при потере фокуса (для мобиле)
let _savedRange=null;
$('noteContentInput').addEventListener('blur',()=>{const sel=window.getSelection();if(sel&&sel.rangeCount)_savedRange=sel.getRangeAt(0).cloneRange();});
$('noteContentInput').addEventListener('focus',()=>{_savedRange=null;});
function _restoreSel(){try{const sel=window.getSelection();sel.removeAllRanges();if(_savedRange)sel.addRange(_savedRange);}catch(e){_savedRange=null;}}
// Подсветка активных кнопок по позиции курсора
function updateFmtBar(){
  try{
    const bold=document.queryCommandState('bold');
    const italic=document.queryCommandState('italic');
    const block=document.queryCommandValue('formatBlock').toLowerCase();
    document.querySelectorAll('.fmt-btn').forEach(b=>{
      const f=b.dataset.fmt;
      b.classList.toggle('on',(f==='bold'&&bold)||(f==='italic'&&italic)||(f==='h1'&&block==='h1')||(f==='h2'&&block==='h2'));
    });
  }catch(e){}
}
$('noteContentInput').addEventListener('keyup',updateFmtBar);
$('noteContentInput').addEventListener('mouseup',updateFmtBar);
$('noteContentInput').addEventListener('touchend',()=>setTimeout(updateFmtBar,50));
document.addEventListener('selectionchange',()=>{if(document.activeElement===$('noteContentInput'))updateFmtBar();});
// preventDefault — не даём потерять фокус из редактора
$('fmtBar').addEventListener('mousedown',e=>{if(e.target.closest('.fmt-btn'))e.preventDefault();});
$('fmtBar').addEventListener('touchstart',e=>{if(e.target.closest('.fmt-btn'))e.preventDefault();},{passive:false});
$('fmtBar').addEventListener('click',e=>{
  const b=e.target.closest('.fmt-btn');if(!b)return;
  const ce=$('noteContentInput'),fmt=b.dataset.fmt;
  ce.focus();_restoreSel();
  if(fmt==='bold')document.execCommand('bold');
  else if(fmt==='italic')document.execCommand('italic');
  else if(fmt==='h1'||fmt==='h2'){const cur=document.queryCommandValue('formatBlock').toLowerCase();document.execCommand('formatBlock',false,cur===fmt?'p':fmt);}
  else if(fmt==='bullet')document.execCommand('insertHTML',false,'<br>• ');
  saveNote();
});
renderNotes();
