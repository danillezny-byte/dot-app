<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff" id="themeColor">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="dot">
<title>dot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #ffffff;
  --bg2: #f7f7f7;
  --bg3: #efefef;
  --text: #2c2c2c;
  --text2: #999999;
  --text3: #cccccc;
  --border: #ebebeb;
  --accent: #2c2c2c;
  --accent-fg: #ffffff;
  --tab-h: 72px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}

[data-dark] {
  --bg: #141414;
  --bg2: #1e1e1e;
  --bg3: #282828;
  --text: #f0f0f0;
  --text2: #666666;
  --text3: #3a3a3a;
  --border: #252525;
  --accent: #f0f0f0;
  --accent-fg: #141414;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist Mono', monospace;
  font-size: 14px;
  overflow: hidden;
  transition: background 0.2s, color 0.2s;
  -webkit-font-smoothing: antialiased;
}

/* LAYOUT */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  padding-top: var(--safe-t);
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 14px;
  flex-shrink: 0;
}

.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 22px;
  color: var(--text);
  letter-spacing: -0.02em;
}

.header-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  width: 34px;
  height: 34px;
  border: none;
  background: var(--bg2);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  font-size: 15px;
  transition: background 0.15s, color 0.15s;
}
.icon-btn:active { background: var(--bg3); }

.screens {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transform: translateY(6px);
  transition: opacity 0.18s ease, transform 0.18s ease;
}

.screen.active {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}

/* TABBAR */
.tabbar {
  display: flex;
  border-top: 1px solid var(--border);
  background: var(--bg);
  height: var(--tab-h);
  padding-bottom: var(--safe-b);
  flex-shrink: 0;
}

.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  color: var(--text3);
  transition: color 0.15s;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
  user-select: none;
  -webkit-user-select: none;
}

.tab.active { color: var(--text); }

.tab-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  transition: transform 0.15s;
}

.tab.active .tab-dot { transform: scale(1.4); }

/* SCROLLABLE */
.scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 20px;
}

.scroll::-webkit-scrollbar { display: none; }

/* DIVIDER */
.divider {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 20px 0 8px;
  font-weight: 500;
}

/* ===== TASKS ===== */
.task-input-wrap {
  padding: 12px 20px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}

.task-input-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.task-input {
  background: none;
  border: none;
  outline: none;
  font-family: 'Geist Mono', monospace;
  font-size: 14px;
  color: var(--text);
  width: 100%;
  padding: 0;
}

.task-input::placeholder { color: var(--text3); }

.date-input {
  background: none;
  border: none;
  outline: none;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  width: 100%;
  padding: 0;
  cursor: pointer;
}

.date-input::-webkit-calendar-picker-indicator { display: none; }

.add-task-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--accent-fg);
  border: none;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  line-height: 1;
  transition: opacity 0.15s;
}
.add-task-btn:active { opacity: 0.7; }

.task-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.2s ease;
}

.task-check {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--text3);
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 1px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.task-check.done {
  background: var(--text);
  border-color: var(--text);
}

.task-check.done::after {
  content: '';
  width: 5px;
  height: 3px;
  border-left: 1.5px solid var(--accent-fg);
  border-bottom: 1.5px solid var(--accent-fg);
  transform: rotate(-45deg) translateY(-1px);
}

.task-text-wrap { flex: 1; }

.task-text {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  transition: color 0.15s;
  word-break: break-word;
}

.task-text.done {
  color: var(--text3);
  text-decoration: line-through;
}

.task-date-label {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
  letter-spacing: 0.04em;
}

.task-delete {
  color: var(--text3);
  font-size: 16px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;
}

.task-item:hover .task-delete { opacity: 1; }
.task-item:active .task-delete { opacity: 1; }

/* ===== NOTES LIST ===== */
.notes-list { padding: 12px 0; }

.note-card {
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  animation: fadeIn 0.2s ease;
  transition: opacity 0.15s;
}
.note-card:active { opacity: 0.6; }

.note-title {
  font-family: 'Instrument Serif', serif;
  font-size: 17px;
  color: var(--text);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.note-preview {
  font-size: 12px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.note-date {
  font-size: 10px;
  color: var(--text3);
  margin-top: 5px;
  letter-spacing: 0.04em;
}

.new-note-btn {
  position: fixed;
  bottom: calc(var(--tab-h) + var(--safe-b) + 16px);
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--accent-fg);
  border: none;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  transition: transform 0.15s;
  z-index: 10;
}
.new-note-btn:active { transform: scale(0.92); }

.empty-state {
  padding: 60px 0;
  text-align: center;
  color: var(--text3);
  font-size: 12px;
  letter-spacing: 0.06em;
}

/* ===== NOTE EDITOR ===== */
.note-editor {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 100;
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-t);
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32, 0, 0.15, 1);
}

.note-editor.open { transform: translateY(0); }

.editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.editor-back {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text2);
  font-size: 12px;
  letter-spacing: 0.06em;
  cursor: pointer;
  border: none;
  background: none;
  font-family: 'Geist Mono', monospace;
  padding: 4px 0;
}

.editor-actions { display: flex; gap: 8px; }

.editor-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 20px 40px;
  -webkit-overflow-scrolling: touch;
}

.editor-body::-webkit-scrollbar { display: none; }

.note-title-input {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  color: var(--text);
  background: none;
  border: none;
  outline: none;
  width: 100%;
  margin-bottom: 16px;
  line-height: 1.3;
  letter-spacing: -0.01em;
}

.note-title-input::placeholder { color: var(--text3); }

.note-content-input {
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  color: var(--text);
  background: none;
  border: none;
  outline: none;
  width: 100%;
  min-height: 300px;
  line-height: 1.8;
  resize: none;
}

.note-content-input::placeholder { color: var(--text3); }

/* Formatting toolbar */
.format-bar {
  display: flex;
  gap: 2px;
  padding: 8px 20px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
}
.format-bar::-webkit-scrollbar { display: none; }

.fmt-btn {
  min-width: 34px;
  height: 30px;
  border: none;
  background: none;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text2);
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  padding: 0 8px;
  white-space: nowrap;
  transition: background 0.12s, color 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fmt-btn:active { background: var(--bg3); color: var(--text); }

/* editor meta */
.editor-meta {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.06em;
  padding: 0 20px 12px;
  flex-shrink: 0;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* linked note highlight */
.linked-ref {
  color: var(--text);
  text-decoration: underline;
  text-decoration-color: var(--text3);
  cursor: pointer;
}

/* Search bar */
.search-wrap {
  padding: 10px 20px 8px;
  flex-shrink: 0;
}

.search-input {
  width: 100%;
  background: var(--bg2);
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  color: var(--text);
  outline: none;
}
.search-input::placeholder { color: var(--text3); }

/* pin dot */
.pinned-indicator {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--text);
  display: inline-block;
  margin-right: 6px;
  vertical-align: middle;
}
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="logo">···</div>
    <div class="header-actions">
      <button class="icon-btn" id="themeToggle" title="Toggle theme">○</button>
    </div>
  </div>

  <!-- SCREENS -->
  <div class="screens">

    <!-- TASKS SCREEN -->
    <div class="screen active" id="screen-tasks">
      <div class="task-input-wrap">
        <div class="task-input-col">
          <input class="task-input" id="taskInput" placeholder="add task..." autocomplete="off" autocorrect="off">
          <input class="date-input" id="taskDate" type="date" title="Pick date">
        </div>
        <button class="add-task-btn" id="addTaskBtn">+</button>
      </div>
      <div class="scroll" id="taskList"></div>
    </div>

    <!-- NOTES SCREEN -->
    <div class="screen" id="screen-notes">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" placeholder="search notes..." autocomplete="off">
      </div>
      <div class="scroll">
        <div class="notes-list" id="notesList"></div>
      </div>
      <button class="new-note-btn" id="newNoteBtn">+</button>
    </div>

  </div>

  <!-- TABBAR -->
  <div class="tabbar">
    <div class="tab active" data-tab="tasks" id="tab-tasks">
      <div class="tab-dot"></div>
      tasks
    </div>
    <div class="tab" data-tab="notes" id="tab-notes">
      <div class="tab-dot"></div>
      notes
    </div>
  </div>
</div>

<!-- NOTE EDITOR (fullscreen overlay) -->
<div class="note-editor" id="noteEditor">
  <div class="editor-header">
    <button class="editor-back" id="editorBack">← back</button>
    <div class="editor-actions">
      <button class="icon-btn" id="pinBtn" title="Pin note">◇</button>
      <button class="icon-btn" id="deleteNoteBtn" title="Delete note">×</button>
    </div>
  </div>
  <div class="editor-meta" id="editorMeta"></div>
  <div class="format-bar">
    <button class="fmt-btn" data-fmt="h1">H1</button>
    <button class="fmt-btn" data-fmt="h2">H2</button>
    <button class="fmt-btn" data-fmt="bold">B</button>
    <button class="fmt-btn" data-fmt="italic">I</button>
    <button class="fmt-btn" data-fmt="bullet">—</button>
    <button class="fmt-btn" data-fmt="check">☐</button>
    <button class="fmt-btn" data-fmt="divider">···</button>
    <button class="fmt-btn" data-fmt="link">[[]]</button>
  </div>
  <div class="editor-body">
    <input class="note-title-input" id="noteTitleInput" placeholder="Title" autocomplete="off">
    <textarea class="note-content-input" id="noteContentInput" placeholder="Start writing..."></textarea>
  </div>
</div>

<script>
// ===== STATE =====
let state = {
  theme: 'light',
  activeTab: 'tasks',
  tasks: [],
  notes: [],
  editingNoteId: null,
  search: ''
};

// ===== STORAGE =====
function save() {
  localStorage.setItem('dot_v1', JSON.stringify({
    theme: state.theme,
    tasks: state.tasks,
    notes: state.notes
  }));
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('dot_v1') || '{}');
    state.theme = d.theme || 'light';
    state.tasks = d.tasks || [];
    state.notes = d.notes || [];
  } catch(e) {}
}

// ===== THEME =====
function applyTheme() {
  if (state.theme === 'dark') {
    document.documentElement.setAttribute('data-dark', '');
    document.getElementById('themeColor').content = '#141414';
    document.getElementById('themeToggle').textContent = '●';
  } else {
    document.documentElement.removeAttribute('data-dark');
    document.getElementById('themeColor').content = '#ffffff';
    document.getElementById('themeToggle').textContent = '○';
  }
}

document.getElementById('themeToggle').addEventListener('click', () => {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  applyTheme();
  save();
});

// ===== TABS =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const t = tab.dataset.tab;
    state.activeTab = t;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.screen').forEach(x => x.classList.remove('active'));
    document.getElementById('screen-' + t).classList.add('active');
  });
});

// ===== TASKS =====
function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function formatDate(d) {
  if (!d) return '';
  const today = todayStr();
  const tom = new Date(); tom.setDate(tom.getDate()+1);
  const tomStr = tom.toISOString().slice(0,10);
  if (d === today) return 'today';
  if (d === tomStr) return 'tomorrow';
  return d;
}

function groupTasks(tasks) {
  const groups = {};
  tasks.forEach(t => {
    const key = t.date || 'someday';
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });
  // Sort: today first, then by date, then someday
  const sorted = Object.keys(groups).sort((a,b) => {
    if (a === 'someday') return 1;
    if (b === 'someday') return -1;
    return a.localeCompare(b);
  });
  return sorted.map(k => ({ label: k, tasks: groups[k] }));
}

function renderTasks() {
  const list = document.getElementById('taskList');
  const active = state.tasks.filter(t => !t.done);
  const done = state.tasks.filter(t => t.done);

  let html = '';

  if (active.length === 0 && done.length === 0) {
    html = '<div class="empty-state">no tasks yet</div>';
  } else {
    const groups = groupTasks(active);
    groups.forEach(g => {
      const label = g.label === 'someday' ? 'someday' : formatDate(g.label);
      html += `<div class="divider">${label}</div>`;
      g.tasks.forEach(t => {
        html += taskHTML(t);
      });
    });

    if (done.length > 0) {
      html += `<div class="divider">done</div>`;
      done.slice(-5).reverse().forEach(t => {
        html += taskHTML(t);
      });
    }
  }

  list.innerHTML = html;

  list.querySelectorAll('.task-check').forEach(el => {
    el.addEventListener('click', () => toggleTask(el.dataset.id));
  });
  list.querySelectorAll('.task-delete').forEach(el => {
    el.addEventListener('click', () => deleteTask(el.dataset.id));
  });
}

function taskHTML(t) {
  return `
    <div class="task-item">
      <div class="task-check ${t.done ? 'done' : ''}" data-id="${t.id}"></div>
      <div class="task-text-wrap">
        <div class="task-text ${t.done ? 'done' : ''}">${escHTML(t.text)}</div>
        ${t.date ? `<div class="task-date-label">${formatDate(t.date)}</div>` : ''}
      </div>
      <span class="task-delete" data-id="${t.id}">×</span>
    </div>`;
}

function addTask() {
  const input = document.getElementById('taskInput');
  const dateInput = document.getElementById('taskDate');
  const text = input.value.trim();
  if (!text) return;

  state.tasks.push({
    id: uid(),
    text,
    date: dateInput.value || '',
    done: false,
    created: Date.now()
  });

  input.value = '';
  save();
  renderTasks();
  input.focus();
}

function toggleTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; save(); renderTasks(); }
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(x => x.id !== id);
  save();
  renderTasks();
}

// Set today as default date
document.getElementById('taskDate').value = todayStr();

document.getElementById('addTaskBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

// ===== NOTES =====
function renderNotes() {
  const list = document.getElementById('notesList');
  const q = state.search.toLowerCase();
  let notes = [...state.notes].sort((a,b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return b.updated - a.updated;
  });

  if (q) {
    notes = notes.filter(n =>
      n.title.toLowerCase().includes(q) ||
      n.content.toLowerCase().includes(q)
    );
  }

  if (notes.length === 0) {
    list.innerHTML = '<div class="empty-state">no notes yet</div>';
    return;
  }

  list.innerHTML = notes.map(n => `
    <div class="note-card" data-id="${n.id}">
      <div class="note-title">
        ${n.pinned ? '<span class="pinned-indicator"></span>' : ''}
        ${escHTML(n.title || 'untitled')}
      </div>
      <div class="note-preview">${escHTML(plainText(n.content).slice(0, 80))}</div>
      <div class="note-date">${relDate(n.updated)}</div>
    </div>
  `).join('');

  list.querySelectorAll('.note-card').forEach(el => {
    el.addEventListener('click', () => openNote(el.dataset.id));
  });
}

function plainText(s) {
  return s.replace(/^#{1,2}\s/gm, '').replace(/\*\*(.*?)\*\*/g, '$1').replace(/_(.*?)_/g, '$1');
}

function relDate(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return 'just now';
  if (d < 3600000) return Math.floor(d/60000) + 'm ago';
  if (d < 86400000) return Math.floor(d/3600000) + 'h ago';
  return Math.floor(d/86400000) + 'd ago';
}

function openNote(id) {
  const n = state.notes.find(x => x.id === id);
  if (!n) return;
  state.editingNoteId = id;
  document.getElementById('noteTitleInput').value = n.title;
  document.getElementById('noteContentInput').value = n.content;
  document.getElementById('editorMeta').textContent = relDate(n.updated);
  document.getElementById('pinBtn').textContent = n.pinned ? '◆' : '◇';
  document.getElementById('noteEditor').classList.add('open');
}

function newNote() {
  const n = { id: uid(), title: '', content: '', pinned: false, created: Date.now(), updated: Date.now() };
  state.notes.unshift(n);
  save();
  openNote(n.id);
}

function saveCurrentNote() {
  const n = state.notes.find(x => x.id === state.editingNoteId);
  if (!n) return;
  n.title = document.getElementById('noteTitleInput').value;
  n.content = document.getElementById('noteContentInput').value;
  n.updated = Date.now();
  save();
  renderNotes();
}

function closeEditor() {
  saveCurrentNote();
  document.getElementById('noteEditor').classList.remove('open');
  state.editingNoteId = null;
}

document.getElementById('editorBack').addEventListener('click', closeEditor);

document.getElementById('deleteNoteBtn').addEventListener('click', () => {
  if (!state.editingNoteId) return;
  state.notes = state.notes.filter(x => x.id !== state.editingNoteId);
  save();
  closeEditor();
  renderNotes();
});

document.getElementById('pinBtn').addEventListener('click', () => {
  const n = state.notes.find(x => x.id === state.editingNoteId);
  if (!n) return;
  n.pinned = !n.pinned;
  document.getElementById('pinBtn').textContent = n.pinned ? '◆' : '◇';
  save();
});

document.getElementById('newNoteBtn').addEventListener('click', newNote);

// Auto-save on typing
let saveTimer;
['noteTitleInput','noteContentInput'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveCurrentNote, 600);
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  state.search = e.target.value;
  renderNotes();
});

// Format bar
document.querySelectorAll('.fmt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const ta = document.getElementById('noteContentInput');
    const fmt = btn.dataset.fmt;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    const val = ta.value;
    const sel = val.slice(start, end);
    let insert = '';

    if (fmt === 'h1') insert = '\n# ';
    else if (fmt === 'h2') insert = '\n## ';
    else if (fmt === 'bold') insert = sel ? `**${sel}**` : '****';
    else if (fmt === 'italic') insert = sel ? `_${sel}_` : '__';
    else if (fmt === 'bullet') insert = '\n— ';
    else if (fmt === 'check') insert = '\n☐ ';
    else if (fmt === 'divider') insert = '\n\n···\n\n';
    else if (fmt === 'link') insert = '[[]]';

    if (fmt === 'bold' || fmt === 'italic') {
      ta.value = val.slice(0, start) + insert + val.slice(end);
    } else {
      ta.value = val.slice(0, start) + insert + val.slice(end);
    }

    ta.focus();
    const newPos = start + insert.length;
    ta.setSelectionRange(newPos, newPos);
    saveCurrentNote();
  });
});

// ===== UTILS =====
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function escHTML(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== INIT =====
load();
applyTheme();
renderTasks();
renderNotes();

// Notification permission
if ('Notification' in window && Notification.permission === 'default') {
  setTimeout(() => Notification.requestPermission(), 2000);
}
</script>
</body>
