<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
::placeholder{color:var(--text3)}
.btn{background:none;border:none;cursor:pointer;font-family:inherit}

/* ── TOKENS ── */
:root{
--bg:#ffffff;--bg2:#f5f5f7;--bg3:#e9e9ed;
--text:#111111;--text2:#888;--text3:#c0c0c6;
--border:#ebebef;
--accent:#6c5ce7;--accent-fg:#ffffff;--accent-dim:rgba(108,92,231,.1);
--red:#ff3b30;
--tab-h:52px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
[data-dark]{
--bg:#0e0e10;--bg2:#1a1a1c;--bg3:#26262a;
--text:#f2f2f7;--text2:#8e8e93;--text3:#44444a;
--border:#26262a;
--accent:#a29bfe;--accent-fg:#ffffff;--accent-dim:rgba(162,155,254,.12);
}

html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:400;overflow:hidden;overscroll-behavior:none;touch-action:none;transition:background .2s,color .2s;-webkit-font-smoothing:antialiased}
button,input,textarea,a,[class*="-btn"],[class*="-check"],[class*="-dot"],[class*="-del"],[class*="tab"],[class*="note-card"],[class*="task-item"],[class*="habit-row"],[class*="date-opt"],[class*="ctx-item"],[class*="ctx-cancel"]{touch-action:manipulation}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100dvh;width:100%;padding-top:var(--safe-t);overflow:hidden}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;flex-shrink:0}
.logo{font-weight:800;font-size:22px;letter-spacing:-.05em;color:var(--text)}
.logo-dot{color:var(--accent)}
.icon-btn{width:36px;height:36px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:color .15s;border-radius:10px}
.icon-btn:active{background:var(--bg2)}

/* ── SCREENS ── */
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateY(4px);transition:opacity .2s,transform .2s}
.screen.active{opacity:1;pointer-events:all;transform:none}

/* ── TAB BAR ── */
.tabbar{display:flex;border-top:1px solid var(--border);background:var(--bg);height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;cursor:pointer;color:var(--text3);position:relative}
.tab svg{flex-shrink:0;width:22px;height:22px;transition:color .15s,transform .15s}
.tab.active svg{color:var(--accent)}
.tab-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:4px;opacity:0;transition:opacity .15s;transform:scale(0);transition:opacity .15s,transform .15s}
.tab.active .tab-dot{opacity:1;transform:scale(1)}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 22px;touch-action:pan-y;overscroll-behavior:contain}
.scroll::-webkit-scrollbar,.fmt-bar::-webkit-scrollbar{display:none}

/* ── DIVIDERS ── */
.divider{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);padding:22px 0 9px}

/* ── EMPTY STATE ── */
.empty-state{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--text3);font-size:13px;font-weight:400;gap:14px;padding:40px 20px}
.empty-state svg{display:block;flex-shrink:0}
.empty-label{font-size:13px;color:var(--text3);font-weight:400;letter-spacing:.01em}

/* ── ANIMATIONS ── */
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes floatUpSlow{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes dotPulse{0%,100%{opacity:.2;transform:scale(.85)}50%{opacity:.7;transform:scale(1)}}
@keyframes illFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.empty-illus{animation:illFadeIn .5s ease both,floatUp 4s ease-in-out .5s infinite}
.empty-illus-slow{animation:illFadeIn .5s ease both,floatUpSlow 5s ease-in-out .5s infinite}

/* ── FAB ── */
.fab{position:absolute;bottom:18px;right:20px;width:50px;height:50px;border-radius:16px;background:var(--accent);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 28px rgba(108,92,231,.4);z-index:10;transition:transform .12s,box-shadow .12s}
.fab svg{width:20px;height:20px;stroke:#fff;flex-shrink:0}
.fab:active{transform:scale(.92);box-shadow:0 3px 14px rgba(108,92,231,.3)}
[data-dark] .fab{box-shadow:0 6px 28px rgba(108,92,231,.5)}

/* ── ADD SHEET ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:40;opacity:0;pointer-events:none;transition:opacity .22s}
.sheet-overlay.open{opacity:1;pointer-events:all}
.add-sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--bg);border-radius:20px 20px 0 0;padding:0 0 calc(8px + var(--safe-b));transform:translateY(100%);transition:transform .32s cubic-bezier(.32,1,.55,1);box-shadow:0 -1px 0 var(--border),0 -24px 60px rgba(0,0,0,.08)}
.add-sheet.open{transform:none}
[data-dark] .add-sheet{box-shadow:0 -1px 0 var(--border),0 -24px 60px rgba(0,0,0,.5)}
.sheet-handle{width:34px;height:4px;background:var(--bg3);border-radius:2px;margin:12px auto 4px}
.add-input-row{display:flex;align-items:flex-start;padding:14px 20px 12px;gap:12px;border-bottom:1px solid var(--border)}
.add-task-input,#habitInput,#renameInput,.search-input,.note-title-input,.note-content-input{-webkit-user-select:text;user-select:text;border:none;outline:none;font-family:inherit;color:var(--text)}
.add-task-input{flex:1;background:none;font-size:17px;font-weight:400;line-height:1.5;min-height:26px;resize:none;overflow:hidden}
.add-submit-btn{flex-shrink:0;font-size:14px;font-weight:600;color:var(--accent);padding:8px 0 8px 4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;min-height:44px}
.add-submit-btn.active{opacity:1;pointer-events:all}
.add-submit-btn:active{opacity:.5}

/* ── DATE ATTRS ── */
.add-attrs{display:flex;align-items:center;padding:2px 14px;min-height:44px;gap:4px}
.date-chip{display:none;align-items:center;gap:4px;background:var(--accent-dim);border-radius:20px;padding:5px 10px 5px 8px;font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;border:none;font-family:inherit;-webkit-user-select:none;transition:opacity .1s}
.date-chip.visible{display:flex}
.date-chip:active{opacity:.6}
.date-chip-x{font-size:13px;color:var(--accent);opacity:.55;margin-left:1px;line-height:1}
.add-date-btn{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:500;color:var(--text3);padding:6px 8px;border-radius:10px;-webkit-user-select:none;transition:background .1s}
.add-date-btn:active{background:var(--bg2)}
.add-date-btn.hidden{display:none}

/* ── DATE PICKER ── */
.date-picker{overflow:hidden;max-height:0;opacity:0;transition:max-height .28s cubic-bezier(.4,0,.2,1),opacity .18s}
.date-picker.open{max-height:440px;opacity:1}
.date-opts{border-top:1px solid var(--border);padding:0 20px}
.date-opt{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid var(--border);cursor:pointer;min-height:52px}
.date-opt:last-child{border-bottom:none}
.date-opt:active{opacity:.5}
.date-opt-left{display:flex;align-items:center;gap:12px}
.date-opt-text{font-size:16px;font-weight:400;color:var(--text)}
.date-opt-sub{font-size:12px;color:var(--text2);margin-top:2px}
.date-opt-right{display:flex;align-items:center;gap:8px}
.date-opt-check{font-size:14px;color:var(--accent);opacity:0}
.date-opt.selected .date-opt-check{opacity:1}

/* ── CALENDAR ── */
.cal-view{display:none;border-top:1px solid var(--border);padding:0 20px 8px}
.cal-view.open{display:block}
.cal-header{display:flex;align-items:center;padding:12px 0 8px}
.cal-back{font-size:14px;font-weight:500;color:var(--accent);cursor:pointer;padding:4px 0}
.cal-month-label{flex:1;text-align:center;font-size:15px;font-weight:600;color:var(--text)}
.cal-nav{display:flex}
.cal-nav-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--accent);cursor:pointer;border-radius:8px}
.cal-nav-btn:active{background:var(--bg2)}
.cal-day-names{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-day-name{text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:4px 0;letter-spacing:.06em;text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:14px;min-height:40px;color:var(--text);cursor:pointer;border-radius:10px;transition:background .1s}
.cal-cell:active:not(.is-past){background:var(--bg2)}
.cal-cell.other-month{opacity:.2;pointer-events:none}
.cal-cell.is-today{font-weight:700;color:var(--accent)}
.cal-cell.is-selected{background:var(--accent);color:#fff;font-weight:600}
.cal-cell.is-past{opacity:.25;pointer-events:none}

/* ── TASKS ── */
.task-item{display:flex;align-items:flex-start;gap:13px;padding:15px 0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;transition:transform .2s ease,opacity .2s ease}
.task-swipe-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:var(--red);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.task-swipe-bg svg{width:18px;height:18px;stroke:#fff}
.task-check{width:22px;height:22px;border:1.5px solid var(--border);border-radius:50%;flex-shrink:0;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;padding:9px;box-sizing:content-box;margin-top:1px}
.task-check:active{transform:scale(.88)}
.task-check.done{background:var(--accent);border-color:var(--accent)}
.task-check.done::after{content:'';width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.task-text-wrap{flex:1;min-width:0}
.task-text{font-size:16px;font-weight:400;line-height:1.5;color:var(--text);word-break:break-word}
.task-text.done{color:var(--text3);text-decoration:line-through;text-decoration-color:var(--text3)}
.task-date-label{font-size:11px;font-weight:500;color:var(--text3);margin-top:2px;letter-spacing:.01em}
.task-date-label.overdue{color:#ff453a}
.task-delete{color:var(--text3);font-size:18px;cursor:pointer;padding:10px 6px 10px 10px;flex-shrink:0;line-height:1;opacity:0;transition:opacity .2s}
.task-item:hover .task-delete{opacity:1}
.task-delete:active{color:var(--red)}
.done-toggle-btn{display:block;width:100%;text-align:left;padding:16px 0 8px;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);transition:color .15s}
.done-toggle-btn:active{color:var(--text)}
.done-list{overflow:hidden;max-height:0;opacity:0;transition:max-height .3s ease,opacity .2s ease}
.done-list.open{max-height:2000px;opacity:1}

/* ── HABITS ── */
.week-row{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:2;background:var(--bg);padding:10px 22px;margin:0 -22px;border-bottom:1px solid var(--border)}
.week-row-spacer{flex:1;min-width:0}
.week-day-label{width:26px;text-align:center;font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--text3);text-transform:uppercase;flex-shrink:0}
.week-day-label.is-today{color:var(--accent)}
.week-row-del{width:26px;flex-shrink:0}
#habitsList{padding-top:0}
.habit-row{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);gap:12px}
.habit-name{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.habit-name-text{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.habit-del{width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3);font-size:16px;line-height:1;cursor:pointer;border-radius:50%;transition:color .12s,background .12s;opacity:0}
.habit-row:active .habit-del,.habit-del:hover{opacity:.5}
.habit-del:active{color:var(--text);background:var(--bg2);opacity:1}
.habit-streak-badge{flex-shrink:0;font-size:11px;color:var(--text3);white-space:nowrap;font-weight:500}
.habit-dots,.week-labels{display:flex;gap:4px;flex-shrink:0}
.habit-dot{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;transition:background .15s,border-color .15s,opacity .12s;flex-shrink:0;opacity:.5}
.habit-dot.checked{background:var(--accent);border-color:var(--accent);opacity:1}
.habit-dot.is-future{opacity:.2;pointer-events:none}
.habit-dot.is-today{border-color:var(--text3);opacity:.7}
.habit-dot:active:not(.is-future){transform:scale(.88)}

/* ── CONTEXT MENU ── */
.ctx-overlay{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s}
.ctx-overlay.open{opacity:1;pointer-events:all}
.ctx-menu{position:fixed;left:12px;right:12px;bottom:calc(12px + var(--safe-b));z-index:71;transform:translateY(120%);transition:transform .28s cubic-bezier(.32,1,.55,1)}
.ctx-menu.open{transform:none}
.ctx-group{background:var(--bg2);border-radius:14px;overflow:hidden;margin-bottom:8px}
.ctx-item{padding:14px 16px;font-size:17px;font-weight:400;min-height:52px;display:flex;align-items:center;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border)}
.ctx-item:last-child{border-bottom:none}
.ctx-item:active{background:var(--bg3)}
.ctx-item.destructive{color:var(--red)}
.ctx-label{padding:10px 16px 6px;font-size:12px;color:var(--text2);text-align:center;font-weight:500}
.ctx-cancel{background:var(--bg2);border-radius:14px;padding:14px 16px;font-size:17px;font-weight:600;color:var(--text);cursor:pointer;text-align:center}
.ctx-cancel:active{background:var(--bg3)}
.ctx-save{font-weight:600;justify-content:center;text-align:center}
#renameInput{width:100%;background:none;font-size:17px;font-weight:400;color:var(--text)}

/* ── NOTES LIST ── */
.notes-top{padding:10px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-input{width:100%;background:var(--bg2);border-radius:10px;padding:9px 14px;font-size:15px;font-weight:400;color:var(--text)}
.note-card{padding:16px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .12s}
.note-card:active{opacity:.6}
.note-title{font-weight:600;font-size:15px;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-preview{font-size:13px;font-weight:400;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.note-meta{font-size:11px;font-weight:500;color:var(--text3);margin-top:5px;letter-spacing:.01em}

/* ── NOTE EDITOR ── */
.note-editor{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .26s cubic-bezier(.32,1,.55,1);z-index:5}
.note-editor.open{transform:none}
.editor-top{display:flex;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.editor-back{font-size:14px;font-weight:600;color:var(--accent);cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:4px}
.editor-spacer{flex:1}
.pin-btn,.delete-note-btn{font-size:18px;color:var(--text3);padding:6px;cursor:pointer;transition:color .12s}
.pin-btn:active,.delete-note-btn:active{color:var(--text)}
.note-date-label{font-size:11px;color:var(--text3);padding:10px 22px 2px;flex-shrink:0;font-weight:500;letter-spacing:.01em}
.fmt-bar{display:flex;align-items:center;padding:4px 14px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;gap:2px}
.fmt-btn{min-width:34px;height:30px;border-radius:7px;color:var(--text3);font-size:14px;font-weight:500;padding:0 8px;white-space:nowrap;transition:background .12s,color .12s;display:flex;align-items:center;justify-content:center}
.fmt-btn:active{background:var(--bg2);color:var(--text)}
.note-title-input{font-weight:700;font-size:26px;letter-spacing:-.02em;background:none;width:100%;padding:18px 22px 8px;line-height:1.25;color:var(--text)}
.note-content-input{font-size:16px;font-weight:400;background:none;width:100%;flex:1;padding:4px 22px 20px;line-height:1.65;resize:none;color:var(--text)}
</style>

</head>

<script>
const uid=()=>Math.random().toString(36).slice(2);
const stripMd=s=>s.replace(/^#+\s/gm,'').replace(/[*_`]/g,'').trim();
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const todayStr=()=>iso(new Date());
const MO_SHORT=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const MO_FULL=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const DAY_RU=['пн','вт','ср','чт','пт','сб','вс'];
const findH=id=>S.habits.find(x=>x.id===id);
const findN=id=>S.notes.find(x=>x.id===id);
const $=id=>document.getElementById(id);
const iso=d=>d.toISOString().slice(0,10);
const show=id=>$(id).classList.add('open');
const hide=id=>$(id).classList.remove('open');
let S={theme:'light',tasks:[],habits:[],notes:[],editingNoteId:null,search:'',doneOpen:false};
function save(){try{localStorage.setItem('dot_v2',JSON.stringify({theme:S.theme,tasks:S.tasks,habits:S.habits,notes:S.notes,doneOpen:S.doneOpen}));}catch(e){console.warn('dot: storage full',e);}}
let _saveTimer=null;
function debouncedSave(){clearTimeout(_saveTimer);_saveTimer=setTimeout(save,300);}
function load(){try{const d=JSON.parse(localStorage.getItem('dot_v2')||'{}');S.theme=d.theme||'light';S.tasks=(d.tasks||[]).map(t=>({done:false,date:'',created:Date.now(),...t}));S.habits=(d.habits||[]).map(h=>({checks:{},...h}));S.notes=(d.notes||[]).map(n=>({pinned:false,createdAt:Date.now(),updatedAt:Date.now(),...n}));S.doneOpen=d.doneOpen||false;}catch(e){}}
load();
function cleanOldChecks(){const cutoff=new Date();cutoff.setDate(cutoff.getDate()-400);const cutStr=cutoff.toISOString().slice(0,10);S.habits.forEach(h=>{if(h.checks)Object.keys(h.checks).forEach(k=>{if(k<cutStr)delete h.checks[k];});});}
cleanOldChecks();
function applyTheme(){
  const dark=S.theme==='dark';
  document.documentElement.toggleAttribute('data-dark',dark);
  $('themeColor').content=dark?'#141414':'#ffffff';
  $('iconSun').style.display=dark?'none':'';
  $('iconMoon').style.display=dark?'':'none';
}
applyTheme();
(()=>{const f=document.createElement('link');f.rel='icon';f.type='image/png';f.href=$('appIcon').href;document.head.appendChild(f);})();
$('themeToggle').addEventListener('click',()=>{S.theme=S.theme==='light'?'dark':'light';applyTheme();save();});
const tabs=[...document.querySelectorAll('.tab')];
const screens=[...document.querySelectorAll('.screen')];
tabs.forEach(tab=>tab.addEventListener('click',()=>{
  tabs.forEach(x=>x.classList.remove('active'));tab.classList.add('active');
  screens.forEach(x=>x.classList.remove('active'));
  $('screen-'+tab.dataset.tab).classList.add('active');
}));
function relDate(){
  // возвращает {tom, sun} — строки дат
  const tm=new Date();tm.setDate(tm.getDate()+1);
  const dow=(new Date().getDay()+6)%7,dts=dow===6?7:6-dow,s=new Date();s.setDate(s.getDate()+dts);
  return {tom:iso(tm),sun:s,sunStr:iso(s)};
}
function fmtDate(d,group){
  if(!d)return group?'без даты':'';
  const {tom,sun,sunStr}=relDate(),today=todayStr();
  if(d===today)return 'сегодня';
  if(d===tom)return 'завтра';
  if(d===sunStr)return group?'на этой неделе':'до вс, '+sun.getDate()+' '+MO_SHORT[sun.getMonth()];
  const dt=new Date(d+'T12:00:00');
  return DAY_RU[(dt.getDay()+6)%7]+', '+dt.getDate()+' '+MO_SHORT[dt.getMonth()];
}
const fmtDateGroup=d=>fmtDate(d,true);
function openSheet(sheetId,overlayId,focusId){
  show(overlayId);
  show(sheetId);
  if(focusId)$(focusId).focus();
}
function closeSheet(sheetId,overlayId){
  document.activeElement?.blur();
  hide(overlayId);
  const el=$(sheetId);el.classList.remove('open');el.style.transform='';el.style.bottom='';
}
if(window.visualViewport){
  const onVV=()=>{
    const vv=window.visualViewport;
    const kb=Math.max(0,window.innerHeight-vv.height-vv.offsetTop);
    ['addSheet','habitSheet','noteEditor'].forEach(id=>{
      const el=$(id);
      if(el&&el.classList.contains('open')) el.style.bottom=kb>0?kb+'px':'';
    });
  };
  window.visualViewport.addEventListener('resize',onVV);
  window.visualViewport.addEventListener('scroll',onVV);
}
document.addEventListener('touchmove',e=>{
  if(e.target.closest('.scroll,.add-sheet,.ctx-menu,.note-editor'))return;
  e.preventDefault();
},{passive:false});
let taskSelectedDate=todayStr(),calViewDate=new Date(),datePickerOpen=false;
(()=>{
const{tom,sun}=relDate();
const t=new Date(tom+'T12:00:00');
const tS=DAY_RU[(t.getDay()+6)%7]+', '+t.getDate()+' '+MO_SHORT[t.getMonth()];
const wS='до вс, '+sun.getDate()+' '+MO_SHORT[sun.getMonth()];
$('dateOpts').innerHTML=[['today','Сегодня'],['tomorrow','Завтра',tS],['week','На этой неделе',wS],['nodate','Без даты'],['cal','Выбрать дату',,'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" opacity=".35"><polyline points="9 18 15 12 9 6"/></svg>']].map(([v,l,s,ic],i)=>`<div class="date-opt${i===0?' selected':''}" data-val="${v}"><div class="date-opt-left"><div><div class="date-opt-text">${l}</div>${s?`<div class="date-opt-sub">${s}</div>`:''}</div></div><div class="date-opt-right">${ic||'<div class="date-opt-check">✓</div>'}</div></div>`).join('');
})();
function openAddSheet(){pushModalState();taskSelectedDate=todayStr();openSheet('addSheet','sheetOverlay','taskInput');}
function closeAddSheet(){
  closeSheet('addSheet','sheetOverlay');
  closeDatePicker();
  const inp=$('taskInput');inp.value='';inp.style.height='auto';
  $('addTaskBtn').classList.remove('active');
  setDate('today');
}
function openDatePicker(){
  datePickerOpen=true;
  $('dateOpts').style.display='';
  hide('calView');
  show('datePicker');
}
function closeDatePicker(){
  datePickerOpen=false;
  hide('datePicker');
  hide('calView');
  $('dateOpts').style.display='';
}
function setDate(val,customDate){
  if(val==='today')      taskSelectedDate=todayStr();
  else if(val==='tomorrow'){const d=new Date();d.setDate(d.getDate()+1);taskSelectedDate=iso(d);}
  else if(val==='week')  {const {sunStr}=relDate();taskSelectedDate=sunStr;}
  else if(val==='nodate')taskSelectedDate='';
  else if(customDate)    taskSelectedDate=customDate;
  let chipLabel='';
  if(val==='tomorrow')   chipLabel='Завтра';
  else if(val==='week')  chipLabel='На этой неделе';
  else if(customDate){const dt=new Date(customDate+'T12:00:00');chipLabel=dt.getDate()+' '+MO_SHORT[dt.getMonth()];}
  const isDefault=val==='today'||val==='nodate';
  $('dateChip').classList.toggle('visible',!isDefault);
  $('addDateBtn').classList.toggle('hidden',!isDefault);
  if(!isDefault&&chipLabel)$('dateChipLabel').textContent=chipLabel;
  $('addDateBtn').lastChild.textContent=val==='nodate'?' Без даты':' Сегодня';
  document.querySelectorAll('.date-opt').forEach(o=>o.classList.toggle('selected',o.dataset.val===val));
}
$('addDateBtn').addEventListener('click',()=>datePickerOpen?closeDatePicker():openDatePicker());
$('dateChip').addEventListener('click',e=>{
  if(e.target.closest('#dateChipX')){setDate('today');closeDatePicker();return;}
  datePickerOpen?closeDatePicker():openDatePicker();
});
$('dateOpts').addEventListener('click',e=>{
  const opt=e.target.closest('.date-opt');if(!opt)return;
  const val=opt.dataset.val;
  if(val==='cal'){$('dateOpts').style.display='none';show('calView');calViewDate=new Date();renderCal();}
  else{setDate(val);closeDatePicker();$('taskInput').focus();}
});
$('calBack').addEventListener('click',()=>{$('dateOpts').style.display='';hide('calView');});
$('calPrevBtn').addEventListener('click',()=>{calViewDate.setMonth(calViewDate.getMonth()-1);renderCal();});
$('calNextBtn').addEventListener('click',()=>{calViewDate.setMonth(calViewDate.getMonth()+1);renderCal();});
function renderCal(){
  const y=calViewDate.getFullYear(),m=calViewDate.getMonth();
  $('calMonthLabel').textContent=MO_FULL[m]+' '+y;
  const todayD=new Date();todayD.setHours(0,0,0,0);
  const first=new Date(y,m,1),last=new Date(y,m+1,0),startDow=(first.getDay()+6)%7;
  let cells='';
  for(let i=0;i<startDow;i++){const d=new Date(y,m,0-startDow+i+1);cells+=`<div class="cal-cell other-month">${d.getDate()}</div>`;}
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(y,m,d);date.setHours(0,0,0,0);
    const cls=[date.getTime()===todayD.getTime()?'is-today':'',date<todayD?'is-past':'',taskSelectedDate===iso(date)?'is-selected':''].filter(Boolean).join(' ');
    cells+=`<div class="cal-cell ${cls}" data-date="${iso(date)}">${d}</div>`;
  }
  const rem=(7-((startDow+last.getDate())%7))%7;
  for(let i=1;i<=rem;i++)cells+=`<div class="cal-cell other-month">${i}</div>`;
  $('calGrid').innerHTML=cells;
}
$('calGrid').addEventListener('click',e=>{
  const cell=e.target.closest('.cal-cell');
  if(!cell||cell.classList.contains('is-past')||cell.classList.contains('other-month'))return;
  const ds=cell.dataset.date;if(!ds)return;
  setDate(ds===todayStr()?'today':'custom',ds);
  closeDatePicker();$('taskInput').focus();
});

function taskHTML(t,_today){
  const dc=t.done?'done':'';
  const ov=(!t.done&&t.date&&t.date<(_today||todayStr()))?'overdue':'';
  const swipeBg=`<div class="task-swipe-bg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></div>`;
  return `<div class="task-item">${swipeBg}<div class="task-check ${dc}" data-id="${t.id}"></div><div class="task-text-wrap"><div class="task-text ${dc}">${esc(t.text)}</div>${t.date?`<div class="task-date-label ${ov}">${fmtDate(t.date)}</div>`:''}</div><span class="task-delete" data-id="${t.id}">×</span></div>`;
}
function renderTasks(){
  const _today=todayStr();
  const el=$('taskList'),active=S.tasks.filter(t=>!t.done),done=S.tasks.filter(t=>t.done);
  if(!active.length&&!done.length){el.innerHTML=`<div class="empty-state"><svg class="empty-illus" width="100" height="88" viewBox="0 0 100 88" fill="none"><rect x="4" y="6" width="26" height="26" rx="7" stroke="currentColor" stroke-width="1.6" opacity=".4"/><path d="M11 19l5 5 9-10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="24" stroke-dashoffset="24" opacity=".55"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="0.5s" begin="0.4s" fill="freeze"/></path><rect x="38" y="14" width="58" height="7" rx="3.5" fill="currentColor" opacity=".12"/><rect x="4" y="44" width="26" height="26" rx="7" stroke="currentColor" stroke-width="1.6" opacity=".18"/><rect x="38" y="52" width="44" height="7" rx="3.5" fill="currentColor" opacity=".08"/></svg><span class="empty-label">нет задач</span></div>`;return;}
  const g={};active.forEach(t=>{const k=t.date||'';if(!g[k])g[k]=[];g[k].push(t);});
  let html=Object.keys(g).sort((a,b)=>!a?1:!b?-1:a.localeCompare(b)).map(k=>`<div class="divider">${fmtDateGroup(k)}</div>`+g[k].map(t=>taskHTML(t,_today)).join('')).join('');
  if(done.length){
    html+=`<button class="btn done-toggle-btn" id="doneToggle">выполненные (${done.length})</button><div class="done-list ${S.doneOpen?'open':''}" id="doneList">${done.slice().reverse().map(t=>taskHTML(t,_today)).join('')}</div>`;
  }
  el.innerHTML=html;
}
function toggleTask(id){const t=S.tasks.find(x=>x.id===id);if(t){t.done=!t.done;save();renderTasks();}}
function deleteTask(id){S.tasks=S.tasks.filter(x=>x.id!==id);save();renderTasks();}
$('taskList').addEventListener('click',e=>{
  const ch=e.target.closest('.task-check'),dl=e.target.closest('.task-delete');
  if(ch)toggleTask(ch.dataset.id);
  else if(dl)deleteTask(dl.dataset.id);
  else if(e.target.closest('.done-toggle-btn')){S.doneOpen=!S.doneOpen;save();renderTasks();}
});
// Swipe-to-delete на задачах
(()=>{
  let sx=0,sy=0,el=null,startT=0;
  $('taskList').addEventListener('touchstart',e=>{
    const item=e.target.closest('.task-item');if(!item)return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;el=item;startT=Date.now();
    el.style.transition='none';
  },{passive:true});
  $('taskList').addEventListener('touchmove',e=>{
    if(!el)return;
    const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(Math.abs(dy)>Math.abs(dx)){el=null;return;}
    if(dx>0){el=null;return;}
    e.preventDefault();
    el.style.transform=`translateX(${Math.max(dx,-80)}px)`;
    el.style.opacity=Math.max(0.4,1+dx/160);
  },{passive:false});
  $('taskList').addEventListener('touchend',e=>{
    if(!el)return;
    const dx=e.changedTouches[0].clientX-sx;
    el.style.transition='transform .2s,opacity .2s';
    if(dx<-60){
      el.style.transform='translateX(-110%)';el.style.opacity='0';
      const id=el.querySelector('.task-check')?.dataset.id||el.querySelector('.task-delete')?.dataset.id;
      setTimeout(()=>{if(id)deleteTask(id);},200);
    }else{
      el.style.transform='';el.style.opacity='';
    }
    el=null;
  },{passive:true});
})();
renderTasks();

function pushModalState(){try{history.pushState({modal:true},'');}catch(e){}}
function popModalState(){
  if($('noteEditor').classList.contains('open')){saveNote();hide('noteEditor');return;}
  if($('addSheet').classList.contains('open')){closeAddSheet();return;}
  if($('habitSheet').classList.contains('open')){closeHabitSheet();return;}
  if($('ctxMenu').classList.contains('open')){hide('ctxOverlay');hide('ctxMenu');return;}
  if($('renameMenu').classList.contains('open')){hide('renameOverlay');hide('renameMenu');return;}
  if($('datePicker').classList.contains('open')){closeDatePicker();return;}
}
window.addEventListener('popstate',e=>{if(e.state&&e.state.modal)popModalState();});

// ── Swipe-to-delete на задачах ──────────────────────
let _sw=null;
$('taskList').addEventListener('touchstart',e=>{
  const item=e.target.closest('.task-item');
  if(!item||e.target.closest('.task-check'))return;
  _sw={el:item,x0:e.touches[0].clientX,dx:0};
},{passive:true});
$('taskList').addEventListener('touchmove',e=>{
  if(!_sw)return;
  const dx=e.touches[0].clientX-_sw.x0;
  if(dx>0){_sw=null;return;}
  _sw.dx=dx;
  const clamped=Math.max(dx,-90);
  _sw.el.style.transform=`translateX(${clamped}px)`;
  _sw.el.style.transition='none';
  const bg=_sw.el.querySelector('.task-swipe-bg');
  if(bg)bg.style.opacity=Math.min(Math.abs(clamped)/90,1);
},{passive:true});
$('taskList').addEventListener('touchend',()=>{
  if(!_sw)return;
  const {el,dx}=_sw;
  el.style.transition='transform .22s ease,opacity .18s ease';
  if(dx<-60){
    el.style.transform='translateX(-110%)';
    el.style.opacity='0';
    const id=el.querySelector('.task-delete')?.dataset.id;
    setTimeout(()=>{if(id)deleteTask(id);},220);
  }else{
    el.style.transform='';
    const bg=el.querySelector('.task-swipe-bg');
    if(bg)bg.style.opacity='0';
  }
  _sw=null;
});

function getWeek(){
  const today=new Date(),dow=today.getDay(),diff=dow===0?6:dow-1,days=[];
  for(let i=0;i<7;i++){const d=new Date(today);d.setDate(today.getDate()-diff+i);days.push(iso(d));}
  return days;
}
function dayLabel(ds){return ['вс','пн','вт','ср','чт','пт','сб'][new Date(ds+'T12:00:00').getDay()];}
function calcStreak(h){
  const today=todayStr(),yd=new Date();yd.setDate(yd.getDate()-1);
  let d=new Date(((h.checks&&h.checks[today])?today:iso(yd))+'T12:00:00'),s=0;
  while(s<366){const k=iso(d);if(!h.checks||!h.checks[k])break;s++;d.setDate(d.getDate()-1);}
  return s;
}
function renderHabits(){
  const week=getWeek(),today=todayStr();
  const weekHeader=`<div class="week-row"><div class="week-row-spacer"></div><div class="week-labels">${week.map(d=>`<div class="week-day-label ${d===today?'is-today':''}">${dayLabel(d).toUpperCase()}</div>`).join('')}</div><div class="week-row-del"></div></div>`;
  const el=$('habitsList');
  if(!S.habits.length){el.innerHTML=weekHeader+`<div class="empty-state" style="min-height:auto;padding-top:48px"><svg class="empty-illus-slow" width="120" height="64" viewBox="0 0 120 64" fill="none"><rect x="2" y="12" width="14" height="28" rx="5" fill="currentColor" opacity=".38" style="animation:dotPulse 1.6s ease-in-out 0s infinite"/><rect x="19" y="12" width="14" height="28" rx="5" fill="currentColor" opacity=".32" style="animation:dotPulse 1.6s ease-in-out 0.14s infinite"/><rect x="36" y="12" width="14" height="28" rx="5" stroke="currentColor" stroke-width="1.4" opacity=".25" style="animation:dotPulse 1.6s ease-in-out 0.28s infinite"/><rect x="53" y="12" width="14" height="28" rx="5" stroke="currentColor" stroke-width="1.4" opacity=".18" style="animation:dotPulse 1.6s ease-in-out 0.42s infinite"/><rect x="70" y="12" width="14" height="28" rx="5" stroke="currentColor" stroke-width="1.4" opacity=".13" style="animation:dotPulse 1.6s ease-in-out 0.56s infinite"/><rect x="87" y="12" width="14" height="28" rx="5" stroke="currentColor" stroke-width="1.4" opacity=".1" style="animation:dotPulse 1.6s ease-in-out 0.70s infinite"/><rect x="104" y="12" width="14" height="28" rx="5" stroke="currentColor" stroke-width="1.4" opacity=".08" style="animation:dotPulse 1.6s ease-in-out 0.84s infinite"/></svg><span class="empty-label">нет привычек</span></div>`;return;}
  el.innerHTML=weekHeader+S.habits.map(h=>{
    const streak=calcStreak(h);
    const dots=week.map(d=>{
      const chk=h.checks&&h.checks[d];
      return `<div class="habit-dot${chk?' checked':''}${d>today?' is-future':''}${d===today?' is-today':''}" data-id="${h.id}" data-date="${d}"></div>`;
    }).join('');
    return `<div class="habit-row" data-id="${h.id}"><div class="habit-name"><span class="habit-name-text">${esc(h.name)}</span>${streak>1?`<span class="habit-streak-badge">${streak}🔥</span>`:''}</div><div class="habit-dots">${dots}</div><div class="habit-del" data-del="${h.id}">×</div></div>`;
  }).join('');
}
function openHabitSheet(){pushModalState();openSheet('habitSheet','habitSheetOverlay','habitInput');}

function addHabit(){
  const name=$('habitInput').value.trim();if(!name)return;
  S.habits.push({id:uid(),name,checks:{}});

}
function toggleHabit(id,date){
  const h=findH(id);if(!h)return;
  if(!h.checks)h.checks={};
  h.checks[date]?delete h.checks[date]:(h.checks[date]=true);
  debouncedSave();renderHabits();
}
function deleteHabit(id){S.habits=S.habits.filter(x=>x.id!==id);save();renderHabits();}

$('habitInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addHabit();}});
function addLongPress(el,onPress,ignore){
  let t=null,id=null;
  const start=e=>{const row=e.target.closest('.habit-row');if(!row||e.target.closest(ignore))return;clearTimeout(t);id=row.dataset.id;t=setTimeout(()=>onPress(id),500);};
  const cancel=()=>clearTimeout(t);
  el.addEventListener('mousedown',start);
  el.addEventListener('mouseup',cancel);
  el.addEventListener('mouseleave',cancel);
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',cancel);
  el.addEventListener('touchmove',cancel);
}
let ctxHabitId=null;
$('habitsList').addEventListener('click',e=>{

  const dot=e.target.closest('.habit-dot');
  if(dot&&!dot.classList.contains('is-future'))toggleHabit(dot.dataset.id,dot.dataset.date);
});

function renderNotes(){
  const q=S.search.toLowerCase();

  const el=$('notesList');
  if(!list.length){el.innerHTML=`<div class="empty-state"><svg class="empty-illus" width="76" height="92" viewBox="0 0 76 92" fill="none"><rect x="4" y="4" width="56" height="68" rx="9" stroke="currentColor" stroke-width="1.6" opacity=".28"/><path d="M44 4 v14 h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity=".18"/><rect x="13" y="27" width="2" height="10" rx="1" fill="currentColor" opacity=".5"><animate attributeName="opacity" values="0.5;0;0.5" dur="1.1s" repeatCount="indefinite"/></rect><rect x="13" y="42" width="38" height="5" rx="2.5" fill="currentColor" opacity=".16"/><rect x="13" y="52" width="30" height="5" rx="2.5" fill="currentColor" opacity=".11"/><rect x="13" y="62" width="22" height="5" rx="2.5" fill="currentColor" opacity=".07"/></svg><span class="empty-label">нет заметок</span></div>`;return;}
  const noteCard=n=>`<div class="note-card" data-id="${n.id}"><div class="note-title">${n.pinned?'◆ ':''} ${esc(n.title)||'Без заголовка'}</div><div class="note-preview">${esc(stripMd(n.content).slice(0,80))||'Нет текста'}</div><div class="note-meta">${n.updatedAt?new Date(n.updatedAt).toLocaleDateString('ru',{day:'numeric',month:'short'}):''}</div></div>`;
